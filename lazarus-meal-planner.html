  {id:"km-o3",name:"Over-Easy Egg Salad",mealType:"lunch",tags:["keto"],cal:575,fat:50,protein:17,carbs:3,prep:"20 min",
    ingredients:["2 eggs","2 tbsp coconut oil","4 oz deli ham, diced","2 romaine lettuces, chopped","1 avocado, diced","2 tbsp olive oil","1 tbsp lemon juice","Salt and pepper"],
    directions:"Toss diced ham, romaine, and avocado with olive oil and lemon juice. Fry eggs over-easy in coconut oil with lid on for 2 min. Flip, cook 10 more seconds. Place eggs on top of salad. Season."},
  // ═══ KETO DINNERS ═══
  {id:"k-d1",name:"Chicken & Mushrooms",mealType:"dinner",tags:["keto"],cal:640,fat:51,protein:46,carbs:5,prep:"20 min",
    ingredients:["6 oz chicken breast","8 oz white mushrooms","2 tbsp butter","¼ cup water","¼ cup heavy cream","1 tsp fresh lemon juice","Salt, pepper","1 handful spinach"],
    directions:"Cook chicken until almost done, rest on plate. Cook mushrooms in butter until golden. Add water, lemon juice and heavy cream, cook until thickened. Season, add chicken back to finish cooking. Serve with spinach."},
  {id:"k-d2",name:"Low Carb Chicken Quesadilla",mealType:"dinner",tags:["keto"],cal:654,fat:43,protein:52,carbs:7,prep:"15 min",
    ingredients:["1 low carb wrap","3 oz pepper jack cheese, shredded","2.5 oz chicken breast, grilled, shredded","½ avocado, sliced thin","1 tsp chopped jalapeño","¼ tsp salt"],
    directions:"Place wrap on frying pan on medium heat. After 2 min flip, lay out pepper jack cheese. Add chicken, avocado and jalapeño to one half. Fold over with spatula, press to flatten. Cut into thirds. Serve with salsa and/or sour cream."},
  {id:"k-d3",name:"Shrimp & Mushroom Zoodles",mealType:"dinner",tags:["keto"],cal:500,fat:32,protein:44,carbs:8,prep:"20 min",
    ingredients:["1 tbsp olive oil","8 oz white mushrooms, sliced","1 tbsp butter","6 oz large shrimp, peeled","1 large zucchini","¼ cup marinara sauce","Salt, pepper","2 tbsp Parmesan cheese"],
    directions:"Heat olive oil, fry mushrooms until oil absorbed. Add butter, cook until golden. Add shrimp, cook 4 min each side. Spiralize zucchini. Toss zoodles in for 2 min. Add marinara, season. Serve with Parmesan."},
  {id:"k-d4",name:"Sriracha Lime Flank Steak",mealType:"dinner",tags:["keto"],cal:560,fat:34,protein:52,carbs:8,prep:"20 min",
    ingredients:["7 oz asparagus","8 oz flank steak","Salt, pepper","½ lime","1 tbsp sriracha","½ tsp vinegar","1 tbsp olive oil"],
    directions:"Fry asparagus on medium heat 10 min. Season steak with salt and pepper. Broil 5 min each side for medium-rare. Rest 5 min. Make sauce: squeeze lime, mix with sriracha, vinegar, salt, pepper. Whisk in olive oil. Slice steak thin, serve with sauce and asparagus."},
  {id:"k-d5",name:"Bunless Butter Burger",mealType:"dinner",tags:["keto"],cal:640,fat:59,protein:24,carbs:1,prep:"15 min",
    ingredients:["4 oz ground beef","Salt, pepper","1 tsp paprika","1 tbsp butter","1 tbsp olive oil","1 large lettuce leaf","1 slice cheese","1 tsp mayonnaise"],
    directions:"Season ground beef with salt, pepper and paprika. Make 2 flat patties, place butter in center of one. Stack second patty on top, seal edges. Cook in olive oil on high heat 4 min each side. Place on lettuce leaf with cheese and mayo."},
  {id:"k-d6",name:"Mustard Lemon Pork & Green Beans",mealType:"dinner",tags:["keto"],cal:591,fat:43,protein:49,carbs:4,prep:"25 min",
    ingredients:["2 4-oz pork loins","1 tbsp olive oil","1 cup green beans","¼ cup chicken broth","2 tbsp heavy cream","½ tsp apple cider vinegar","¼ lemon","½ tbsp mustard"],
    directions:"Pat pork dry, season with salt and pepper. Sear in olive oil on high heat 2 min each side. Set aside. Deglaze pan with broth, vinegar and cream. Simmer. Add lemon juice and mustard. Return pork, coat in sauce. Cook 10 min with lid slightly open. Roast green beans at 350°F for 10 min."},
  {id:"k-d7",name:"Avocado Lime Salmon & Cauli-rice",mealType:"dinner",tags:["keto"],cal:420,fat:27,protein:37,carbs:5,prep:"20 min",
    ingredients:["50g cauliflower","½ avocado","½ lime","1 tbsp red onion, diced","1 6-oz salmon fillet","Salt, pepper"],
    directions:"Rice cauliflower in food processor, cook in oiled pan 8 min. Blend avocado, lime juice and red onion until smooth. Cook salmon skin-side down 4-5 min, season, flip and cook another 4-5 min. Serve over cauliflower rice with avocado lime sauce."},
  {id:"km-c2",name:"Garlic Ghee Baked Chicken Breast",mealType:"dinner",tags:["keto"],cal:400,fat:30,protein:40,carbs:2,prep:"25 min",
    ingredients:["2 chicken breasts, sliced","2 tsp garlic powder","2 tbsp ghee","4 cloves garlic, minced","2 tsp sea salt"],
    directions:"Preheat oven to 350°F. Place sliced chicken on foil. Add garlic powder, ghee, fresh garlic, and salt. Rub over chicken. Fold foil to cover. Bake 20 minutes until cooked through (165°F internal)."},
  {id:"km-c3",name:"Tuscan Pan-Fried Chicken over Zoodles",mealType:"dinner",tags:["keto"],cal:540,fat:36,protein:45,carbs:5,prep:"20 min",
    ingredients:["2 chicken breasts, diced","2 small eggs, whisked","¼ tsp salt","Dash black pepper","2 tsp garlic powder","2 tsp Italian seasoning","14 cherry tomatoes, quartered","30 fresh basil leaves","Olive oil","1 zucchini"],
    directions:"Mix egg, salt, pepper, garlic powder, Italian seasoning. Coat diced chicken. Sauté in olive oil until cooked. Add quartered tomatoes and basil, cook 2-3 min. Peel and shred zucchini for noodles. Serve chicken over zoodles."},
  {id:"km-c4",name:"Easy Kung Pao Chicken",mealType:"dinner",tags:["keto"],cal:570,fat:37,protein:50,carbs:6,prep:"25 min",
    ingredients:["2 chicken breasts (1 lb), diced","½ cucumber, peeled and diced","1 small carrot, diced","10 cashews (optional)","6 dried red chilies","4 cloves garlic, minced","2 tbsp tamari sauce","1 tsp vinegar","Coconut oil"],
    directions:"Sauté diced chicken in coconut oil on high heat until cooked. Remove. Sauté cucumber, carrot, cashews, and chilies on high 5 min. Add cooked chicken, garlic, tamari, and vinegar. Sauté 5 more minutes and serve."},
  {id:"km-c5",name:"Spicy Chicken Sauté with Avocado",mealType:"dinner",tags:["keto"],cal:575,fat:40,protein:44,carbs:4,prep:"25 min",
    ingredients:["2 chicken breasts, diced","2 tbsp garlic powder","1 tbsp onion powder","1 tsp chili powder","2 tsp salt","Dash black pepper","1 avocado, diced","1 green pepper, diced","2 tbsp olive oil","1 tsp mustard","Coconut oil"],
    directions:"Mix spices together. Rub into diced chicken. Sauté in coconut oil on medium heat. When cooked, cool 10 min. Toss chicken with diced avocado and pepper, olive oil, mustard, salt and pepper."},
  {id:"km-b2",name:"Easy Fajitas with Guacamole",mealType:"dinner",tags:["keto"],cal:640,fat:47,protein:46,carbs:4,prep:"30 min",
    ingredients:["1 lb beef steak, sliced","1 small onion, sliced","1 bell pepper, sliced","1 tbsp cumin powder","1 tbsp garlic powder","Dash chili powder","Salt and pepper","Romaine lettuce leaves","1 tbsp avocado oil"],
    directions:"Add oil to pan, sauté onion, then beef and bell pepper. When beef is cooked, add cumin, garlic powder, chili powder, salt and pepper. Serve with guacamole and lettuce leaves."},
  {id:"km-b3",name:"Pepper Cabbage Beef Rolls",mealType:"dinner",tags:["keto"],cal:375,fat:26,protein:30,carbs:4,prep:"25 min",
    ingredients:["⅔ lb ground beef","¼ onion, diced","1 bell pepper, diced","2 tbsp cilantro","1 tsp ginger, diced","4 cloves garlic, minced","2 tsp cumin powder","Salt and pepper","Coconut oil","8 large cabbage leaves"],
    directions:"Sauté onions, ground beef, and peppers in coconut oil. When cooked, add cilantro, ginger, garlic, cumin, salt, pepper. Blanch cabbage leaves in boiling water 20 sec each. Spoon beef onto leaves and roll."},
  {id:"km-b4",name:"Oregano Meatballs with Olive Tapenade",mealType:"dinner",tags:["keto"],cal:525,fat:32,protein:45,carbs:0,prep:"30 min",
    ingredients:["1 lb ground beef","2 tbsp fresh oregano","1 egg","2 tsp salt","1 tsp black pepper","Coconut oil","1 zucchini, shredded"],
    directions:"Mix all meatball ingredients, form 12-15 meatballs. Pan-fry in coconut oil. Serve over shredded zucchini noodles with olive tapenade."},
  {id:"km-b5",name:"Mini Zucchini Avocado Burgers",mealType:"dinner",tags:["keto"],cal:370,fat:30,protein:23,carbs:3,prep:"25 min",
    ingredients:["1 large zucchini, sliced ½-inch thick","½ lb ground beef","¼ avocado, sliced","2 tbsp olive oil","1 tsp salt","Coconut mayo (optional)","Mustard (optional)"],
    directions:"Preheat oven to 400°F. Grease tray with oil and salt. Place zucchini slices on tray. Form 7-8 small beef patties, place on tray. Bake 15 min. Assemble: patty between 2 zucchini rounds with avocado, mayo, mustard."},
  {id:"km-b6",name:"Grilled Steak with Asparagus Sauté",mealType:"dinner",tags:["keto"],cal:450,fat:33,protein:31,carbs:3,prep:"25 min",
    ingredients:["2 beef medallions (½-¾ lb)","6 asparagus shoots, chopped","4 cherry tomatoes, halved","2 button mushrooms, chopped","¼ onion, chopped","¼ cup parsley","½ tbsp fresh ginger","Coconut oil","Salt and pepper"],
    directions:"Rub salt over beef. Pan-fry 2 min each side for medium-rare. Rest on plate. Sauté onions in coconut oil until translucent. Add asparagus and mushrooms until soft. Add tomatoes, parsley and ginger. Sauté a few more minutes. Serve together."},
  {id:"km-f1",name:"Lemon Garlic Baked Shrimp",mealType:"dinner",tags:["keto"],cal:400,fat:17,protein:43,carbs:7,prep:"30 min",
    ingredients:["1 lb shrimp, peeled and deveined","8 cloves garlic, minced","½ tbsp lemon juice","2 tbsp ghee","½ tsp salt","¼ tsp black pepper","1 bell pepper, chopped","4 button mushrooms","½ zucchini, chopped"],
    directions:"Preheat oven to 400°F. Melt ghee, mix with garlic, salt, pepper. Dip shrimp in mixture, place on skewers. Skewer vegetables. Bake 5 min each side. Serve with reserved garlic ghee."},
  {id:"km-f2",name:"Salmon Swiss Chard Stew",mealType:"dinner",tags:["keto"],cal:300,fat:10,protein:44,carbs:4,prep:"25 min",
    ingredients:["16 oz chicken broth","Two 6 oz salmon filets","2 cups swiss chard, chopped","1 zucchini, chopped","1 clove garlic, minced","Juice from ½ lemon","Salt and pepper","2 eggs"],
    directions:"Heat broth in saucepan. Add chopped vegetables and garlic. Chop salmon into strips, add to pan. Add lemon juice. Cook 5 min on medium heat. Crack 2 eggs into pot like poached eggs. Season to taste."},
  {id:"km-f3",name:"Coconut Seafood Soup",mealType:"dinner",tags:["keto"],cal:370,fat:20,protein:45,carbs:4,prep:"30 min",
    ingredients:["16 oz chicken broth","3 button mushrooms, sliced","½ cup kale, chopped","2 tilapia filets, chunked","5 shrimp","10 mussels (optional)","½ cup coconut cream","1 tsp fish sauce","Salt"],
    directions:"Bring broth to boil. Add vegetables, bring to boil. Add seafood, boil 4 min until shrimp are pink. Add coconut cream, fish sauce, salt. Stir gently. Serve immediately."},
  {id:"km-f5",name:"Tuna Fish Cakes with Parsley Tomato Sauce",mealType:"dinner",tags:["keto"],cal:560,fat:30,protein:50,carbs:7,prep:"20 min",
    ingredients:["Two 5-oz cans tuna","1 tbsp fresh basil, chopped","1 jalapeño, diced","2 eggs, whisked","2 tbsp coconut flour","2 tbsp shredded coconut","2 tbsp olive oil","½ tbsp salt","Coconut oil","2 tbsp parsley","4 cherry tomatoes","1 clove garlic","1 tsp lemon juice"],
    directions:"Flake tuna, mix all fish cake ingredients. Form 4 thin patties. Pan-fry in coconut oil until golden on both sides. Blend sauce ingredients in food processor. Serve sauce with fish cakes."},
  {id:"km-o1",name:"Pork Chops with Apple Radish Salsa",mealType:"dinner",tags:["keto"],cal:225,fat:10,protein:30,carbs:2,prep:"25 min",
    ingredients:["2 pork chops","¼ green apple, diced","1 radish, diced","2 slices ginger, diced","1 tsp mustard","Coconut oil"],
    directions:"Prepare salsa by combining diced apple, radish, and ginger. Pan fry pork chops in coconut oil. Serve with salsa and mustard."},
  {id:"km-o2",name:"Spinach Bacon Sauté",mealType:"dinner",tags:["keto"],cal:370,fat:32,protein:15,carbs:3,prep:"25 min",
    ingredients:["5 oz thick bacon, diced","1 lb spinach","Pepper to taste"],
    directions:"Cook diced bacon in frying pan. Add spinach and cook on medium heat until wilted. Season with pepper."},
  // ═══ PALEO BREAKFASTS ═══
  {id:"p-b1",name:"Very Berry Coconut Smoothie",mealType:"breakfast",tags:["paleo"],cal:280,fat:14,protein:6,carbs:32,servings:"2 servings",prep:"5 min",
    ingredients:["1½ cups fresh or frozen berries","½ cup vanilla coconut yogurt","⅔ cup coconut milk","1 tbsp ground flaxseed","1 tsp honey"],
    directions:"Combine all ingredients in a blender and process until smooth. Serve immediately."},
  {id:"p-b2",name:"Grain-Free Granola Crunch",mealType:"breakfast",tags:["paleo"],cal:320,fat:24,protein:8,carbs:18,servings:"10 servings",prep:"30 min",
    ingredients:["1½ cups almond flour","½ cup coconut oil","¼ cup honey","2 tsp cinnamon","2 tsp vanilla extract","¼ tsp salt","1 cup shredded coconut","1 cup mixed nuts","¼ cup sunflower seeds"],
    directions:"Preheat oven to 275°F. Coat baking sheet with cooking spray. Combine all ingredients, mix well. Spread in even layer and bake, tossing once, until browned, 20-25 min. Cool before serving."},
  {id:"p-b3",name:"Perfect Paleo Pancakes",mealType:"breakfast",tags:["paleo"],cal:380,fat:22,protein:14,carbs:28,servings:"4 servings",prep:"20 min",
    ingredients:["4 eggs","1 cup coconut milk","2 tsp vanilla extract","1 tbsp honey","½ cup coconut flour","1 tsp baking soda","½ tsp salt","¼ tsp cinnamon","2 tbsp coconut oil"],
    directions:"Beat eggs, coconut milk, vanilla, and honey. Mix coconut flour, baking soda, salt, cinnamon separately. Combine wet and dry. Heat skillet with coconut oil, ladle 3-inch pancakes. Cook until browned, about 2 min per side."},
  {id:"p-b4",name:"Avocado, Bacon & Tomato Omelet",mealType:"breakfast",tags:["paleo"],cal:440,fat:34,protein:26,carbs:6,servings:"2 servings",prep:"15 min",
    ingredients:["1 tsp coconut oil","4 eggs, beaten","1 tomato, diced","½ avocado, diced","4 strips bacon, cooked and crumbled","¼ tsp salt","¼ tsp pepper","2 tbsp cilantro"],
    directions:"Heat oil in skillet over medium-high. Add half the eggs, push edges to center as they set. When nearly set, add half the tomatoes, avocado, and bacon down the middle. Season. Slide onto plate, folding in half. Repeat for second omelet."},
  {id:"p-b5",name:"Crispy Cauliflower Fritters",mealType:"breakfast",tags:["paleo"],cal:350,fat:22,protein:16,carbs:20,servings:"4 servings",prep:"25 min",
    ingredients:["1 head cauliflower","2 carrots, grated","4 eggs, beaten","½ cup flaxseed meal","½ cup sunflower seeds","½ cup hazelnuts, chopped","½ cup parsley, chopped","2 tsp lime juice","1 tsp salt","2 tsp thyme","1 tsp smoked paprika","2 tbsp coconut oil"],
    directions:"Pulse cauliflower in food processor to coarse meal. Mix with all ingredients except oil. Heat oil in skillet over medium-high. Ladle ¼ cup batter per fritter, flatten. Cook 3 min per side until golden brown."},
  {id:"p-b6",name:"Sweet Potato & Sausage Frittata",mealType:"breakfast",tags:["paleo"],cal:380,fat:24,protein:28,carbs:14,servings:"8 servings",prep:"25 min",
    ingredients:["3 tbsp coconut oil","1 lb Italian sausage","1 sweet potato, grated","4 green onions, sliced","10 eggs","¾ tsp salt","¼ tsp pepper"],
    directions:"Heat oil in oven-proof skillet, brown sausage 5 min. Add sweet potato, cook 3 min. Stir in green onions. Whisk eggs with salt and pepper, pour over mixture. Cook on medium-high until edges set, about 3 min. Broil until browned and set, 3-4 min."},
  {id:"p-b7",name:"Quick Butternut Squash Hash",mealType:"breakfast",tags:["paleo"],cal:280,fat:12,protein:10,carbs:28,servings:"4 servings",prep:"30 min",
    ingredients:["1 tbsp coconut oil","2 cloves garlic, minced","2 cups diced butternut squash","½ yellow onion, diced","Salt, pepper","1 bell pepper, diced","1 tomato, chopped","4 strips bacon, crumbled","2 cups fresh spinach"],
    directions:"Heat oil, cook garlic 1 min. Add squash, onion, season, cook 5 min. Add bell pepper, cook 5 min. Add tomato and bacon, cook 5 min more. Stir in spinach until wilted. Serve immediately."},
  // ═══ PALEO LUNCHES/SOUPS ═══
  {id:"p-s1",name:"Butternut Squash & Apple Soup",mealType:"lunch",tags:["paleo"],cal:320,fat:16,protein:4,carbs:38,servings:"6 servings",prep:"30 min",
    ingredients:["2 tbsp coconut oil","1 onion, diced","1 butternut squash, cubed (6 cups)","16 oz coconut milk","2 cups apple cider","2 apples, cubed","1 carrot, chopped","1 tsp salt","1 tsp cinnamon","½ tsp nutmeg","2 tbsp chives"],
    directions:"Heat oil, cook onion 5 min. Add squash, coconut milk, cider, apples, carrot, and spices. Boil, then simmer covered 20 min. Puree with immersion blender. Serve garnished with chives."},
  {id:"p-s4",name:"Classic Beef & Vegetable Soup",mealType:"lunch",tags:["paleo"],cal:520,fat:28,protein:48,carbs:16,servings:"4 servings",prep:"30 min",
    ingredients:["2 lbs lean ground beef","1 onion, diced","3 carrots, sliced","2 celery stalks, sliced","6 cloves garlic, minced","3 cups chopped cabbage","15 oz can diced tomatoes","4 cups beef broth","1 tbsp thyme","2 bay leaves","½ tsp salt","½ tsp pepper","¼ cup parsley"],
    directions:"Brown beef 5 min. Add onion, carrots, celery, garlic, cook 5 min. Add cabbage, tomatoes, broth, bring to boil. Add thyme, bay leaves, salt, pepper. Cover, simmer 15 min. Remove bay leaves, garnish with parsley."},
  {id:"p-s5",name:"Mexican Chicken Salad with Chipotle-Avocado Dressing",mealType:"lunch",tags:["paleo"],cal:420,fat:28,protein:32,carbs:12,servings:"4 servings",prep:"15 min",
    ingredients:["1 head romaine lettuce","6 radishes, sliced","1 red bell pepper, diced","1 jicama, diced","½ red onion, diced","¾ lb cooked chicken breast","1 garlic clove","1 avocado","¼ cup water","3 tbsp lime juice","3 tbsp olive oil","¼ tsp chipotle powder","1 tsp salt"],
    directions:"For dressing: blend garlic, avocado, water, lime juice, olive oil, chipotle, salt until smooth. Toss lettuce, radishes, bell pepper, jicama, onion. Add chicken, toss. Pour dressing over salad."},
  // ═══ PALEO DINNERS ═══
  {id:"p-e1",name:"Pan-Seared Salmon with Tropical Salsa",mealType:"dinner",tags:["paleo"],cal:520,fat:32,protein:38,carbs:18,servings:"4 servings",prep:"18 min",
    ingredients:["2 mangos, diced","½ cup red onion, diced","1 avocado, diced","1 jalapeño, diced","¼ cup cilantro","2 tbsp coconut oil (salsa)","¾ tsp salt","½ tsp pepper","Juice of 1 lime","2 tbsp coconut oil (salmon)","4 6-oz salmon fillets"],
    directions:"Mix salsa ingredients. Heat oil in skillet on high, add salmon skin-side down, reduce to medium-low. Press down with spatula. Cook 5-6 min until skin releases. Flip, sear 30 seconds. Serve topped with salsa."},
  {id:"p-e2",name:"Tangy Chicken Piccata",mealType:"dinner",tags:["paleo"],cal:380,fat:18,protein:44,carbs:6,servings:"4 servings",prep:"25 min",
    ingredients:["2 chicken breasts, halved horizontally","1 egg","2 tbsp water","½ cup almond flour","1 tsp salt","½ tsp black pepper","¼ tsp cayenne","1 tbsp chicken broth","Juice of 1 lemon","½ cup white wine","1 tbsp capers","1 tbsp parsley"],
    directions:"Preheat oven to 400°F. Dredge chicken in egg wash then almond flour mixture. Sear in hot oil 3 min per side. Bake 5 min. Deglaze skillet with broth, lemon, wine. Simmer to reduce by half. Add capers, spoon over chicken."},
  {id:"p-e3",name:"Spicy Chinese Beef in Lettuce Cups",mealType:"dinner",tags:["paleo"],cal:480,fat:28,protein:38,carbs:14,servings:"4 servings",prep:"25 min",
    ingredients:["2 tbsp coconut oil","1 onion, diced","1 lb ground beef","1 tsp salt","2 cloves garlic, minced","2 tbsp ginger, minced","2 tbsp coconut aminos","1 tbsp rice vinegar","1 tbsp sesame oil","1 tbsp almond butter","2 tsp honey","2 tsp chili paste","½ cup green onions","½ cup water chestnuts","12 lettuce leaves","¼ cup cashews"],
    directions:"Heat oil, cook onion 5 min. Add beef and salt, brown 5 min. Whisk sauce ingredients. Add to beef, cook 3-4 min. Stir in green onions and water chestnuts. Serve in lettuce leaves with cashews."},
  {id:"p-e4",name:"Lemon-Rosemary Steak with Asparagus",mealType:"dinner",tags:["paleo"],cal:520,fat:30,protein:48,carbs:10,servings:"4 servings",prep:"25 min",
    ingredients:["1½ lbs flank steak","4 cloves garlic, minced","1 tbsp rosemary, minced","1 tsp salt","½ tsp pepper","2 tbsp coconut oil","1 onion, sliced","1 lb asparagus, cut 2-inch","1 lb mushrooms, sliced","1 tsp lemon zest"],
    directions:"Score steak in diamond pattern. Rub with half the garlic, rosemary, salt, pepper. Sear in hot oil 4 min per side. Rest 5 min covered. Sauté onion, add garlic, add asparagus and mushrooms 5 min. Add lemon zest. Slice steak against grain, serve with vegetables."},
  {id:"p-e5",name:"Brazilian Garlic-Lime Shrimp",mealType:"dinner",tags:["paleo"],cal:420,fat:20,protein:48,carbs:6,servings:"4 servings",prep:"30 min",
    ingredients:["2 lbs large shrimp, peeled","2 tbsp lime juice","½ cup cilantro, divided","8 cloves garlic, minced","½ tsp salt, divided","½ tsp red pepper flakes","2 tbsp coconut oil"],
    directions:"Marinate shrimp with lime juice, ¼ cup cilantro, half garlic, ¼ tsp salt, ¼ tsp pepper flakes for 20 min. Heat oil on high. Cook shrimp with marinade until pink, about 5 min. Stir in remaining cilantro, salt, and pepper flakes."},
  {id:"p-e6",name:"Quick Pork Chops with Sautéed Mushrooms",mealType:"dinner",tags:["paleo"],cal:480,fat:28,protein:44,carbs:8,servings:"4 servings",prep:"30 min",
    ingredients:["4 bone-in pork chops","1 tsp salt","½ tsp pepper","1 tbsp coconut oil","1 onion, sliced","3 cloves garlic, minced","1 lb mushrooms, sliced","2 tsp rosemary","½ cup chicken broth"],
    directions:"Season chops, brown in oil 3 min per side. Remove. Cook onion and garlic 5 min. Add mushrooms and rosemary, cook 5-7 min. Add broth, simmer. Return chops, cover, cook 8 min until done."},
  {id:"p-e7",name:"Tom Ka Gai (Thai Coconut Chicken Soup)",mealType:"dinner",tags:["paleo"],cal:420,fat:28,protein:32,carbs:12,servings:"6 servings",prep:"30 min",
    ingredients:["1 tbsp coconut oil","3 shallots, chopped","2 tsp Thai red curry paste","Two 14-oz cans coconut milk","4 cups chicken broth","1 tbsp honey","1 head broccoli","½ lb mushrooms","2 chicken breasts, sliced thin","3 tbsp lime juice","3 tbsp fish sauce"],
    directions:"Heat oil, cook shallots 5 min. Add curry paste 1 min. Add coconut milk, broth, honey, boil then simmer 5 min. Strain, return broth. Add mushrooms and broccoli 5 min. Add chicken 5 min. Add lime juice and fish sauce before serving."},
  {id:"p-e8",name:"Mexican Chicken Soup",mealType:"dinner",tags:["paleo"],cal:380,fat:16,protein:42,carbs:14,servings:"8 servings",prep:"30 min",
    ingredients:["2 tbsp coconut oil","1 onion, diced","4 cloves garlic, minced","2 jalapeños, diced","2 poblano chiles, diced","1 tsp cumin","1 tsp chili powder","1 tsp oregano","1 tsp salt","8 cups chicken broth","28 oz can diced tomatoes","2 lbs cooked shredded chicken","Juice of 2 limes","1 cup cilantro","½ avocado"],
    directions:"Heat oil, cook onion 5 min. Add garlic, peppers 2 min. Add spices, broth, tomatoes, boil. Add chicken 10 min. Stir in lime juice and cilantro. Garnish with avocado."},
  // ═══ PALEO SIDES ═══
  {id:"p-sl1",name:"Cauliflower Rice Salad",mealType:"side",tags:["paleo","keto"],cal:280,fat:18,protein:6,carbs:22,servings:"4 servings",prep:"15 min",
    ingredients:["2 cups cauliflower, chopped","½ cup pomegranate seeds","½ cup red grapes, halved","½ cup hazelnuts, toasted","2 cups baby spinach","⅓ cup basil","⅓ cup cilantro","⅓ cup parsley","3 tbsp olive oil","Juice of 1 lemon","½ tsp salt","1 clove garlic","1 tsp honey"],
    directions:"Pulse cauliflower to rice-size pieces. Add pomegranate, grapes, hazelnuts, spinach. Blend herbs, olive oil, lemon, salt, garlic, honey for vinaigrette. Toss and serve."},
  {id:"p-sl2",name:"Roasted Butternut Squash Salad",mealType:"side",tags:["paleo"],cal:300,fat:18,protein:4,carbs:30,servings:"4 servings",prep:"30 min",
    ingredients:["3 cups butternut squash, cubed","1 tbsp coconut oil","½ tsp salt","10 cups arugula","½ red onion, sliced","1 tbsp maple syrup","1 tbsp red wine vinegar","1 tsp Dijon mustard","2 tbsp olive oil","½ cup pecans"],
    directions:"Preheat oven to 400°F. Toss squash with oil and salt, roast 20 min. Combine arugula and onion. Whisk maple syrup, vinegar, mustard, then whisk in oil. Toss with squash. Top with pecans."},
  // ═══ SNACKS ═══
  {id:"p-sn1",name:"Kale Chips with a Kick",mealType:"snack",tags:["paleo"],cal:120,fat:8,protein:4,carbs:8,servings:"4 servings",prep:"20 min",
    ingredients:["1 tsp paprika","½ tsp salt","½ tsp coriander","½ tsp cumin","¼ tsp cayenne","1 bunch curly kale","2 tbsp coconut oil"],
    directions:"Preheat oven to 375°F. Mix spices. Tear dry kale into pieces. Drizzle with oil, toss. Spread on baking sheet. Sprinkle spice mix. Bake until crispy, 10-15 min."},
  {id:"p-sn2",name:"Paleo Power Balls",mealType:"snack",tags:["paleo"],cal:140,fat:8,protein:4,carbs:14,servings:"25 balls",prep:"15 min",
    ingredients:["1¼ cups raw almonds","1 lb pitted Medjool dates","1 tbsp water","1½ tsp vanilla","1 tsp cinnamon","1 tsp orange zest","¾ tsp salt"],
    directions:"Toast almonds at 350°F for 5 min. Pulse until ground. Add dates, water, vanilla, cinnamon, orange zest, salt. Process until finely chopped. Form 1½-inch balls, roll in reserved ground almonds."},
  {id:"km-s1",name:"Raspberry Arugula Salad",mealType:"side",tags:["keto"],cal:110,fat:9,protein:1,carbs:3,prep:"5 min",
    ingredients:["2 oz arugula","1 oz baby spinach","1 cucumber, chopped","10-15 parsley leaves","14 pitted olives","Salt","1 tbsp olive oil","1 tbsp lemon juice","14 raspberries"],
    directions:"Toss all ingredients except raspberries in a bowl. Top with raspberries without mixing in."},
  {id:"km-s2",name:"Easy Guacamole",mealType:"side",tags:["keto","paleo"],cal:180,fat:15,protein:3,carbs:6,prep:"5 min",
    ingredients:["1 ripe avocado, mashed","1 tbsp garlic powder","½ tbsp onion powder","2 tsp lime juice","Salt","2 tbsp fresh cilantro","Dash chili powder (optional)"],
    directions:"Mix all ingredients together. Serve immediately."},
  // ═══ IFM RENEW FOOD PLAN RECIPES ═══
  {id:"ifm-b1",name:"Almond Cacao Smoothie",mealType:"breakfast",tags:["mediterranean","anti-inflammatory","plant-based"],cal:253,fat:20,protein:25,carbs:19,prep:"5 min",
    ingredients:["1 cup unsweetened almond milk","1 scoop protein powder","½ tbsp cacao powder (100% raw)","½ tsp almond extract","1–2 cups kale, chopped","½ small avocado","¼ cup ice cubes"],
    directions:"Put all ingredients in a blender in the order listed. Blend, starting on low speed and working up to high speed, until smooth. Use frozen berries instead of ice for desired thickness."},
  {id:"ifm-b2",name:"CranBlueberry Kale Smoothie",mealType:"breakfast",tags:["mediterranean","anti-inflammatory","plant-based"],cal:291,fat:12,protein:21,carbs:22,prep:"5 min",
    ingredients:["1 cup unsweetened flax milk","1–2 scoops protein powder","1 tsp raw organic coconut butter","½ tbsp almond butter","2 cups kale, roughly chopped","1 cup organic berries (½ cup cranberries + ½ cup blueberries)"],
    directions:"Put ingredients in blender in order listed. Blend on very low speed to start, gradually working up to high speed until well-blended. Serve immediately."},
  {id:"ifm-b3",name:"Southwestern Egg Muffins",mealType:"breakfast",tags:["mediterranean","anti-inflammatory","paleo"],cal:248,fat:16,protein:17,carbs:6,servings:"4 servings",prep:"30 min",
    ingredients:["10 organic eggs","1 tbsp extra-virgin olive oil","1 onion, finely diced","4 cloves garlic, minced","1 red bell pepper, diced","1 cup spinach, chopped","½ tsp cumin","½ tsp turmeric","½ tsp chili powder","¼ tsp sea salt","¼ tsp black pepper","½ jalapeño, minced","¼ cup cilantro, minced","Coconut oil for greasing"],
    directions:"Preheat oven to 350°F. Whisk eggs. Sauté onion 5 min, add garlic, peppers, spinach, and seasonings. Cook 3 min. Stir in cilantro. Combine with eggs. Divide into 12 greased muffin tins. Bake 20 min until knife comes out clean."},
  {id:"ifm-b4",name:"Nut Porridge",mealType:"breakfast",tags:["mediterranean","anti-inflammatory","plant-based"],cal:265,fat:20,protein:9,carbs:11,servings:"2 servings",prep:"10 min",
    ingredients:["2 tbsp dried coconut flakes (unsweetened)","2 tbsp pumpkin seeds","2 tbsp ground flax seeds","2 tbsp chia seeds","¼ cup raw walnuts","½ tsp cinnamon","⅛ tsp sea salt","1 cup boiling water"],
    directions:"Combine all dry ingredients in a high-speed blender and blend until finely ground. Pour boiling water into blender, cover with lid, blend from low to high until smooth. Transfer to bowl and garnish with organic berries."},
  {id:"ifm-b5",name:"Raspberry Chia Seed Pudding",mealType:"breakfast",tags:["mediterranean","anti-inflammatory","plant-based"],cal:350,fat:28,protein:9,carbs:10,servings:"4 servings",prep:"15 min + overnight",
    ingredients:["2 cups organic raspberries, divided","¾ cup full-fat coconut milk","¼ tsp sea salt","½ tsp vanilla extract","½ tsp cinnamon","½ cup chia seeds","½ cup dried coconut flakes","2 tbsp hemp seeds","¼ cup raw walnuts, chopped"],
    directions:"Puree 1 cup raspberries with coconut milk until smooth. Combine with salt, vanilla, cinnamon, and chia seeds. Refrigerate 12 hours or overnight. Top with coconut, hemp seeds, walnuts, and remaining berries."},
  {id:"ifm-b6",name:"Mediterranean Egg & Vegetable Scramble",mealType:"breakfast",tags:["mediterranean","anti-inflammatory"],cal:314,fat:25,protein:14,carbs:7,servings:"4 servings",prep:"15 min",
    ingredients:["8 organic eggs","1 tbsp extra-virgin olive oil","½ cup onion, diced","2 cloves garlic, minced","1 cup greens (spinach, kale, chard), chopped","¼ cup tomatoes, diced","¼ cup kalamata olives, diced","½ tsp dried basil","1 dash cayenne pepper","1 pinch black pepper","1 avocado, sliced"],
    directions:"Whisk eggs. Heat oil, sauté onion and garlic 2 min. Add greens, tomatoes, olives, seasonings. Cook 2-4 min. Add eggs and scramble until done but not dry. Top each serving with 2 slices of avocado."},
  {id:"ifm-l1",name:"Zucchini Noodles with Pesto & Tempeh",mealType:"lunch",tags:["mediterranean","anti-inflammatory","plant-based"],cal:419,fat:25,protein:26,carbs:27,servings:"2 servings",prep:"25 min",
    ingredients:["2 cups zucchini, spiral cut into noodles","½ tsp sea salt","2 tsp ghee or coconut oil","1 medium sweet onion, diced","8 oz organic tempeh, diced","2 tbsp dairy-free pesto"],
    directions:"Sprinkle zucchini noodles with salt, drain 15-20 min. Squeeze out moisture. Sauté onion in ghee until translucent. Add tempeh, sauté 3-5 min. Add zucchini noodles, cook 3-4 min. Add pesto, toss and serve."},
  {id:"ifm-l2",name:"Curried Broccoli Soup",mealType:"lunch",tags:["mediterranean","anti-inflammatory","plant-based"],cal:193,fat:13,protein:6,carbs:13,servings:"6 servings",prep:"35 min",
    ingredients:["2 tbsp ghee or coconut oil","4 leeks, white and light-green, sliced","1 large yellow onion, chopped","3 medium shallots, chopped","1½ lbs broccoli, cut into pieces","4 cups bone broth","1 tbsp curry powder","½ tsp sea salt","¼ tsp black pepper","1 cup full-fat coconut milk"],
    directions:"Melt ghee, sauté leeks, onion, shallots 5-10 min. Add broccoli and broth. Boil then simmer 20 min. Add curry powder, salt, pepper. Puree with immersion blender. Add coconut milk, bring back to boil."},
  {id:"ifm-l3",name:"Caesar Salad (Dairy-Free)",mealType:"lunch",tags:["mediterranean","anti-inflammatory"],cal:123,fat:11,protein:3,carbs:3,servings:"4 servings",prep:"10 min",
    ingredients:["24 romaine lettuce leaves (about 3 hearts)","2 cloves garlic, minced","1½ tsp Dijon mustard","2 tbsp tahini","Juice from half a lemon","2 tbsp apple cider vinegar","2 tbsp extra-virgin olive oil","2 anchovies","Pinch sea salt and pepper"],
    directions:"Blend all dressing ingredients until smooth. Wash, dry, and tear lettuce into bite-size pieces. Toss with dressing. Add grilled chicken for additional protein if desired."},
  {id:"ifm-l4",name:"Green Chicken & Vegetable Soup",mealType:"lunch",tags:["mediterranean","anti-inflammatory","paleo"],cal:280,fat:9,protein:31,carbs:14,servings:"4 servings",prep:"30 min",
    ingredients:["1 medium onion","Whole carrots","3 stalks celery","4-6 cloves garlic","1 tbsp olive oil","1 bunch cilantro","3-4 serrano peppers, seeded","6-8 cups chicken broth","1-2 tsp cumin","2-3 tsp oregano","¼ tsp pepper","12 oz cooked shredded chicken","2-3 cups chopped zucchini"],
    directions:"Pulse onion, carrots, celery, and half the garlic in food processor. Sauté 8-10 min. Blend remaining garlic with cilantro, peppers, and 2 cups broth. Season sautéed veggies with cumin, oregano, pepper. Add chicken, zucchini, remaining broth, and cilantro mixture. Boil then simmer 10 min."},
  {id:"ifm-d1",name:"Asian Beef Lettuce Wraps (IFM)",mealType:"dinner",tags:["mediterranean","anti-inflammatory","paleo"],cal:415,fat:23,protein:34,carbs:12,servings:"4 servings",prep:"20 min",
    ingredients:["1 tbsp tamari or coconut aminos","¼ cup apple cider vinegar","2 tbsp fresh lime juice","¼ tsp sea salt","16 oz grass-fed beef","1 tsp sesame oil","½ cup onion, chopped","3 cloves garlic, minced","1 tbsp fresh ginger, minced","1½ cups carrots, matchsticks","1½ cups daikon radish, matchsticks","2 cups cabbage, sliced","15-oz can black soybeans","12 lettuce leaves","2 tbsp cashews","¼ cup scallions"],
    directions:"Mix tamari, vinegar, lime juice, salt. Sauté beef in sesame oil 5 min. Cook onion, garlic, ginger 2 min. Add carrots, radish, cabbage 2-3 min. Add soybeans and liquid mixture, return beef. Simmer 3 min. Fill lettuce leaves, top with cashews and scallions."},
  {id:"ifm-d2",name:"Baked Salmon with Dill",mealType:"dinner",tags:["mediterranean","anti-inflammatory"],cal:205,fat:9,protein:28,carbs:0,servings:"4 servings",prep:"20 min",
    ingredients:["4 wild salmon fillets (5 oz each)","4 tsp extra-virgin olive oil","4 tsp chopped fresh dill","¼ tsp sea salt","¼ tsp black pepper"],
    directions:"Preheat oven to 375°F. Line cookie sheet with parchment paper. Place salmon on sheet. Mix olive oil, dill, salt, and pepper. Brush over salmon. Bake 12-15 minutes."},
  {id:"ifm-d3",name:"Coconut Lime Roasted Chicken",mealType:"dinner",tags:["mediterranean","anti-inflammatory","paleo"],cal:342,fat:22,protein:30,carbs:3,servings:"5 servings",prep:"75 min",
    ingredients:["1 whole organic chicken (2½-3 lbs)","1 kaffir lime","3 tbsp coconut oil","3 cloves garlic, chopped","1 tsp sea salt","1 tsp black pepper","1 small sweet onion, quartered","3 tbsp dried coconut flakes"],
    directions:"Preheat oven to 475°F. Zest lime, combine with coconut oil, garlic, salt, pepper. Spread under chicken skin over breasts and thighs. Place remaining oil, lime quarters, and onion in cavity. Sprinkle with coconut. Bake 15-20 min at 475°F, then reduce to 400°F for 45-60 min."},
  {id:"ifm-d4",name:"Herbed Turkey Burgers",mealType:"dinner",tags:["mediterranean","anti-inflammatory","paleo"],cal:270,fat:16,protein:31,carbs:1,servings:"4 servings",prep:"20 min",
    ingredients:["1¼ lbs lean ground turkey","2 tbsp fresh parsley, chopped","2 tbsp fresh chives, chopped","4 tsp extra-virgin olive oil","2-3 cloves garlic, minced","1 egg","1½ tbsp Dijon mustard","4 large lettuce or collard green leaves"],
    directions:"Combine turkey, parsley, chives, olive oil, garlic, and egg. Mix gently. Form 4 patties. Grill 7-9 min per side until internal temp reaches 160-165°F. Spread lettuce or collard greens with Dijon mustard and wrap."},
  {id:"ifm-d5",name:"Inside-Out Bison Burgers",mealType:"dinner",tags:["mediterranean","anti-inflammatory","paleo"],cal:222,fat:12,protein:25,carbs:3,servings:"4 servings",prep:"30 min",
    ingredients:["1 tbsp olive oil","½ cup diced red onion","½ cup diced mushrooms","1 tbsp balsamic vinegar","2 cups spinach","1 small tomato, diced","1 tbsp Dijon mustard","¼ tsp sea salt","¼ tsp black pepper","16 oz grass-fed ground bison","8 romaine lettuce leaves"],
    directions:"Sauté onion 4 min. Add mushrooms and balsamic vinegar 5 min. Add spinach and tomatoes 1 min. Stir in mustard, season. Cool 15 min. Form bison into 4 balls, make a well, stuff with spinach mixture, seal and flatten. Grill or broil 2-3 min per side. Serve between romaine leaves."},
  {id:"ifm-d6",name:"Halibut and Broccoli",mealType:"dinner",tags:["mediterranean","anti-inflammatory"],cal:228,fat:10,protein:28,carbs:4,servings:"4 servings",prep:"20 min",
    ingredients:["3 cups broccoli florets","¼ cup finely ground almonds","2 tsp fresh tarragon or basil","1 lb halibut fillets (4 pieces)","1 tbsp olive oil or coconut oil","½ cup chicken broth","⅓ cup lemon juice","¼ tsp sea salt","¼ tsp black pepper"],
    directions:"Steam broccoli until slightly tender. Mix ground almonds and herbs, coat halibut fillets. Heat oil, cook fillets 4 min each side. Transfer to plate. Add broth to skillet, scrape up bits. Add broccoli, lemon juice, salt, pepper. Spoon over halibut."},
  {id:"ifm-d7",name:"Ginger Basil Vegetable Stir-Fry",mealType:"dinner",tags:["mediterranean","anti-inflammatory","plant-based"],cal:388,fat:16,protein:27,carbs:24,servings:"4 servings",prep:"25 min",
    ingredients:["7 oz mung bean & edamame pasta","4 tbsp fresh lime juice + zest of half a lime","1 tbsp toasted sesame oil","2 tbsp apple cider vinegar","3 tbsp coconut aminos","1 tbsp coconut oil","2 cups carrots, matchsticks","1 cup green beans","2 cups baby bok choy, chopped","2 tbsp fresh ginger, chopped","3 cloves garlic, minced","6 scallions, cut into 1-inch pieces","½ cup fresh basil, chopped","¼ cup raw cashews"],
    directions:"Cook pasta 7-8 min, drain and rinse. Whisk lime juice, sesame oil, vinegar, coconut aminos. Melt coconut oil, sauté carrots, green beans, bok choy, ginger, garlic, scallions 2-4 min. Add lime mixture 30 sec. Toss with pasta, basil, and cashews."},
  {id:"ifm-d8",name:"Spiced Turkey & Zucchini Meatballs",mealType:"dinner",tags:["mediterranean","anti-inflammatory","paleo"],cal:215,fat:11,protein:27,carbs:2,servings:"4 servings",prep:"20 min",
    ingredients:["1 lb ground turkey","1 small zucchini, grated","2 tbsp shallots, minced","1 garlic clove, minced","1 large egg, beaten","1 tsp dried oregano","¾ tsp sea salt","½ tsp fennel seeds, crushed","½ tsp dried sage","2 tbsp avocado oil","Fresh basil for garnish"],
    directions:"Preheat oven to 400°F. Combine all ingredients except oil and basil. Form 12 balls. Heat avocado oil in oven-safe skillet over medium-high. Brown meatballs 30 sec per side. Transfer to oven, bake 8-10 min until firm. Garnish with basil."},
  {id:"ifm-sl1",name:"Lemon Cashew Kale Salad",mealType:"side",tags:["mediterranean","anti-inflammatory","plant-based"],cal:214,fat:15,protein:7,carbs:14,servings:"2 servings",prep:"10 min",
    ingredients:["1 tbsp extra virgin olive oil","1 tbsp lemon juice","1 pinch black pepper","3-4 cups fresh kale, chopped ribbon style","½ tsp sea salt","¼ cup raw cashews, chopped"],
    directions:"Whisk olive oil, lemon juice, and pepper. Massage kale with sea salt by hand for 2 minutes until soft and dark green. Add olive oil mixture and cashews. Toss until evenly coated."},
  {id:"ifm-sl2",name:"Fruity Spinach Salad",mealType:"side",tags:["mediterranean","anti-inflammatory","plant-based"],cal:165,fat:13,protein:5,carbs:6,servings:"4 servings",prep:"10 min",
    ingredients:["1 pint fresh strawberries (about 2 cups sliced)","8 oz baby spinach, torn","1 tbsp sesame seeds","½ tbsp poppy seeds","1 scallion, chopped","1 tbsp flax seed oil","2 tbsp balsamic vinegar","1 tbsp olive oil","¼ cup chopped raw walnuts"],
    directions:"Place spinach in salad bowl. Slice berries and arrange over spinach. Blend dressing ingredients (except olive oil) until smooth, then drizzle in olive oil on low speed. Pour over salad and toss. Garnish with walnuts."},
  {id:"hl-d1",name:"Ginger-Garlic Chicken & Cauliflower Rice",mealType:"dinner",tags:["keto","paleo","mediterranean","anti-inflammatory","low-fodmap"],cal:479,fat:31,protein:28,carbs:27,servings:"4 servings",prep:"25 min",
    ingredients:["6 cups cauliflower","½ cup coconut oil","⅓ cup minced ginger","⅓ cup minced garlic","1 lb grilled chicken breast","3½ tbsp fresh chives","¼ cup apple cider vinegar"],
    directions:"Grate cauliflower on large holes of box grater or pulse in food processor to rice-like texture. Mince garlic and ginger. Heat coconut oil and ginger in large skillet over medium-high heat. Once ginger sizzles, add garlic and sauté until beginning to brown. Cut chicken into bite-sized pieces, add to skillet and toss to coat. Add cauliflower, cook stirring frequently 7-8 min until slightly softened. Transfer to bowl, stir in apple cider vinegar, chopped chives, and salt to taste. Serve warm."},
  {id:"ifm-sl3",name:"Garlic Mashed Cauliflower",mealType:"side",tags:["mediterranean","anti-inflammatory","keto","plant-based"],cal:117,fat:9,protein:3,carbs:4,servings:"4 servings",prep:"15 min",
    ingredients:["1 medium head cauliflower","2 tbsp coconut oil","3 tbsp full-fat coconut milk","¼ tsp sea salt","1 clove garlic (or 1 tsp garlic powder)","¼ tsp black pepper"],
    directions:"Cut cauliflower into 4-6 pieces. Steam until cooked but not overdone. Place in food processor with remaining ingredients and blend until the consistency of mashed potatoes. Serve immediately."},
  {id:"ifm-sl4",name:"Crispy Brussels Sprout Chips",mealType:"snack",tags:["mediterranean","anti-inflammatory","paleo"],cal:148,fat:7,protein:7,carbs:10,servings:"4 servings",prep:"15 min",
    ingredients:["2 lbs Brussels sprouts, washed and dried","2 tbsp ghee or coconut oil, melted","¼ tsp sea salt","¼ tsp pepper","Lemon zest (optional)"],
    directions:"Preheat oven to 300°F. Cut bottom tips off sprouts, separate all leaves. Toss with melted ghee, salt, pepper, and lemon zest. Spread in single layer on two baking trays. Bake 8-10 min until crispy and brown at edges."},
  {id:"ifm-sl5",name:"Roasted Rosemary Almonds",mealType:"snack",tags:["mediterranean","anti-inflammatory","paleo"],cal:112,fat:10,protein:4,carbs:2,servings:"16 servings",prep:"15 min",
    ingredients:["1 tbsp ghee or coconut oil","2 cups raw whole almonds","2 tbsp dried rosemary","2 tsp sea salt","¼ tsp black pepper"],
    directions:"Melt ghee in large skillet over medium-low heat. Add almonds, stir until coated. Add rosemary, salt, pepper. Toast 8-12 min, stirring often. Transfer to plate and cool."},
  {id:"ifm-sl6",name:"Baked Jicama Fries",mealType:"side",tags:["mediterranean","anti-inflammatory","plant-based"],cal:79,fat:2,protein:1,carbs:7,servings:"4 servings",prep:"45 min",
    ingredients:["1 medium jicama","½ tsp turmeric","¼ tsp sea salt","¼ tsp black pepper","1½ tsp coconut oil, melted"],
    directions:"Preheat oven to 400°F. Peel jicama, slice into fry-sized pieces. Mix turmeric, salt, pepper. Drizzle coconut oil, toss. Sprinkle spice mix, toss again. Spread in single layer. Bake 40 min, flipping halfway."},
  {id:"ifm-d9",name:"Vegetable Shirataki Noodle Stir-Fry",mealType:"dinner",tags:["mediterranean","anti-inflammatory","plant-based"],cal:243,fat:12,protein:6,carbs:28,servings:"4 servings",prep:"25 min",
    ingredients:["3 tbsp toasted sesame oil, divided","1 medium onion, sliced","2-3 garlic cloves, minced","¼ lb shiitake mushrooms, sliced","2-3 tbsp coconut aminos","½ lb broccoli florets","4 oz bamboo shoots, sliced","1 tbsp fresh ginger, grated","2 tsp sesame seeds","16 oz shirataki noodles"],
    directions:"Heat 2 tbsp sesame oil, cook onions, garlic, mushrooms, and coconut aminos until tender. Add remaining oil, broccoli, bamboo shoots, ginger, sesame seeds. Cook 4-5 min. Rinse and boil shirataki noodles 3 min, drain and dry. Add to vegetables, toss over medium-high heat."},
  // ═══ LOW FODMAP RECIPES ═══
  {id:"lf-d1",name:"Chicken, Squash & Greens Bowl",mealType:"dinner",tags:["low-fodmap","mediterranean","anti-inflammatory"],cal:357,fat:20,protein:22,carbs:19,servings:"4 servings",prep:"32 min",
    ingredients:["4 cups butternut squash, cubed","2 tsp coconut oil","¼ cup tahini","1½ tbsp apple cider vinegar","1 lemon","1 avocado","6 cups mixed greens","8 oz precooked chicken pieces"],
    directions:"Preheat oven to 425°F. Spread cubed butternut squash on baking sheet, drizzle with melted coconut oil, sprinkle with salt. Roast 25 min, tossing halfway. Whisk tahini, apple cider vinegar, 1½ tbsp lemon juice, and 2 tbsp water for dressing. Dice avocado. Combine squash, mixed greens, chicken, and avocado. Drizzle with tahini dressing and toss."},
  {id:"lf-d2",name:"Caesar Shrimp Tacos",mealType:"dinner",tags:["low-fodmap","mediterranean"],cal:390,fat:15,protein:32,carbs:28,servings:"4 servings",prep:"20 min",
    ingredients:["1 lb large shrimp, peeled and deveined","8 tsp olive oil, divided","6 tsp garlic, minced, divided","Salt and pepper","¼ cup plain yogurt","2 tbsp grated Parmesan","2 anchovies","1 tsp Dijon mustard","Juice of 1 lemon","8 corn tortillas","2 cups shredded romaine lettuce"],
    directions:"Blend yogurt, Parmesan, anchovies, mustard, 2 tsp garlic, 4 tsp olive oil, and lemon juice until smooth for Caesar dressing. Heat remaining olive oil in skillet over medium-high. Add remaining garlic then shrimp, season with salt and pepper. Cook until pink, about 3 min per side. Warm corn tortillas. Fill with shrimp, toss lettuce with dressing, add to tacos."},
  {id:"lf-b1",name:"Mixed Berries Oatmeal with Protein Boost",mealType:"breakfast",tags:["low-fodmap","mediterranean","plant-based"],cal:320,fat:8,protein:18,carbs:42,servings:"2 servings",prep:"10 min",
    ingredients:["2 eggs","1 cup rolled oats","1 cup milk (or milk alternative)","½ tsp vanilla extract","2 cups water","1 cup mixed berries (blueberries, strawberries, raspberries)"],
    directions:"Crack eggs into saucepan and whisk until even in color. Add rolled oats, milk, vanilla and 2 cups water, mix to combine. Place over medium-high heat and bring to a boil. Reduce heat to medium-low and cook 5 minutes, or until creamy. Divide into bowls and top with mixed berries."},
  {id:"lf-d3",name:"Herb-Crusted Steak & Roasted Potatoes",mealType:"dinner",tags:["low-fodmap","paleo"],cal:550,fat:24,protein:42,carbs:38,servings:"4 servings",prep:"35 min",
    ingredients:["1½ lbs sirloin steak","2 tbsp olive oil, divided","1 tsp rosemary","1 tsp thyme","1 tsp salt","½ tsp black pepper","1½ lbs Yukon Gold potatoes, cubed","1 tbsp garlic-infused oil (low FODMAP alternative)","2 cups green beans"],
    directions:"Preheat oven to 425°F. Toss cubed potatoes with 1 tbsp olive oil, salt and pepper. Roast 25 min until golden. Rub steak with remaining olive oil, rosemary, thyme, salt and pepper. Sear in hot skillet 4 min per side for medium-rare. Rest 5 min. Steam green beans 4 min until crisp-tender. Slice steak against grain and serve with potatoes and green beans."},
  {id:"lf-b2",name:"Low FODMAP Veggie Egg Scramble",mealType:"breakfast",tags:["low-fodmap","keto"],cal:310,fat:22,protein:20,carbs:6,servings:"2 servings",prep:"10 min",
    ingredients:["4 large eggs","1 tbsp garlic-infused olive oil","1 cup baby spinach","½ cup bell pepper, diced","½ cup zucchini, diced","¼ cup chives, chopped","Salt and pepper","¼ avocado, sliced"],
    directions:"Heat garlic-infused oil in skillet over medium heat. Add bell pepper and zucchini, sauté 3 min until slightly softened. Add spinach and cook until wilted. Whisk eggs with salt and pepper, pour into skillet. Scramble until just set but not dry. Top with chives and sliced avocado."},
  {id:"lf-d4",name:"Low FODMAP Potato Hash with Chicken Sausage",mealType:"dinner",tags:["low-fodmap","paleo"],cal:420,fat:18,protein:28,carbs:36,servings:"4 servings",prep:"25 min",
    ingredients:["3-4 medium Yukon Gold potatoes (400g), diced into ½-inch cubes","2 tbsp olive oil","2 precooked chicken sausages (check for low FODMAP), sliced","1 cup bell pepper, diced","2 cups baby spinach","1 tsp smoked paprika","½ tsp cumin","Salt and pepper","2 eggs, fried (optional)"],
    directions:"Heat olive oil in large skillet over medium-high heat. Add diced potatoes, cook 10 min stirring occasionally until golden and tender. Add sliced chicken sausage and bell pepper, cook 5 more min. Add spinach, paprika, cumin, salt and pepper. Stir until spinach is wilted. Serve topped with fried eggs if desired."},
  {id:"lf-l1",name:"Low FODMAP Deli Turkey Roll-Ups",mealType:"lunch",tags:["low-fodmap","keto"],cal:280,fat:18,protein:24,carbs:4,servings:"2 servings",prep:"5 min",
    ingredients:["6 slices deli turkey","½ cucumber, cut into sticks","1 carrot, cut into sticks","½ bell pepper, cut into strips","2 tbsp Dijon mustard","1 tbsp olive oil","Salt and pepper"],
    directions:"Lay turkey slices flat. Spread a thin layer of Dijon mustard on each slice. Place cucumber, carrot, and bell pepper sticks on each slice. Roll up tightly. Drizzle with olive oil and season with salt and pepper. Serve immediately or pack for an on-the-go lunch."},
  {id:"lf-d5",name:"One-Pan Lemon Herb Chicken & Rice",mealType:"dinner",tags:["low-fodmap","mediterranean"],cal:480,fat:16,protein:38,carbs:42,servings:"4 servings",prep:"35 min",
    ingredients:["1 lb chicken thighs, boneless","1 cup white rice","2 cups chicken broth (low FODMAP)","1 tbsp garlic-infused olive oil","1 lemon, juiced and zested","1 tsp dried oregano","1 tsp dried thyme","Salt and pepper","1 cup green beans, trimmed","Fresh parsley for garnish"],
    directions:"Preheat oven to 400°F. Season chicken with oregano, thyme, salt, pepper, and half the lemon juice. Heat garlic-infused oil in oven-safe skillet. Sear chicken 3 min per side, remove. Add rice and broth to skillet, stir. Place chicken on top of rice, add green beans around edges. Cover with foil. Bake 25 min until rice is tender and chicken reaches 165°F. Garnish with lemon zest and parsley."},
  {id:"km-s3",name:"Creamy Asparagus Mash",mealType:"side",tags:["keto"],cal:85,fat:7,protein:2,carbs:2,prep:"10 min",
    ingredients:["10 asparagus shoots, chopped and blanched","¼ onion, diced","Coconut oil","2 tbsp coconut cream","2 tbsp fresh parsley","1 tsp lemon juice","½ tsp salt","Dash pepper"],
    directions:"Sauté onions in coconut oil until translucent. Blanch asparagus 2 min. Blend sautéed onion, asparagus, coconut cream, parsley, lemon juice, salt, pepper. Serve warm or cold."},
  // ═══ PLANT-BASED BREAKFASTS ═══
  {id:"pb-b1",name:"Tofu Scramble with Sweet Potato Hash",mealType:"breakfast",tags:["plant-based"],cal:415,fat:14,protein:22,carbs:48,prep:"20 min",
    ingredients:["5 oz firm tofu, crumbled","1 medium sweet potato, diced small","1 cup baby spinach","½ cup red bell pepper, diced","¼ cup onion, diced","1 tbsp olive oil","2 tbsp nutritional yeast","½ tsp turmeric","½ tsp cumin","¼ tsp garlic powder","Salt and black pepper"],
    directions:"Heat olive oil in a skillet over medium-high. Add diced sweet potato and cook 8-10 min, stirring occasionally, until golden and tender. Push to one side of the pan. Add onion and bell pepper to the other side, cook 3 min until softened. Add crumbled tofu to the pan and stir everything together. Add nutritional yeast, turmeric, cumin, garlic powder, salt, and pepper. Toss until tofu is coated and heated through, about 2 min. Stir in spinach until wilted. Serve immediately."},
  {id:"pb-b2",name:"Overnight Oats with Hemp Seeds & Berries",mealType:"breakfast",tags:["plant-based"],cal:440,fat:14,protein:18,carbs:58,prep:"5 min + overnight",
    ingredients:["¾ cup rolled oats","1 cup unsweetened oat milk","2 tbsp hemp seeds","1 tbsp chia seeds","1 tbsp almond butter","1 tsp maple syrup","½ tsp vanilla extract","½ cup mixed berries (fresh or frozen)","1 tbsp pumpkin seeds"],
    directions:"In a jar or container, combine oats, oat milk, hemp seeds, chia seeds, almond butter, maple syrup, and vanilla. Stir well to combine. Cover and refrigerate overnight or at least 4 hours. When ready to serve, stir and add a splash more oat milk if too thick. Top with mixed berries and pumpkin seeds. Serve cold or microwave 90 seconds for a warm version."},
  {id:"pb-b3",name:"Green Protein Smoothie Bowl",mealType:"breakfast",tags:["plant-based"],cal:430,fat:12,protein:24,carbs:56,prep:"10 min",
    ingredients:["1 scoop plant-based vanilla protein powder","1 frozen banana","1 cup frozen mango chunks","2 cups baby spinach","¾ cup unsweetened almond milk","Toppings: ¼ cup granola, 1 tbsp chia seeds, ¼ cup sliced strawberries, 1 tbsp coconut flakes"],
    directions:"Add protein powder, frozen banana, frozen mango, spinach, and almond milk to a high-speed blender. Blend until thick and smooth — use the tamper or stop to scrape down sides as needed. The base should be thick enough to eat with a spoon; add minimal liquid to maintain consistency. Pour into a bowl and arrange toppings: granola, chia seeds, strawberries, and coconut flakes. Serve immediately."},
  {id:"pb-b4",name:"Banana Oat Protein Pancakes",mealType:"breakfast",tags:["plant-based"],cal:390,fat:10,protein:18,carbs:58,servings:"2 servings",prep:"15 min",
    ingredients:["1 cup rolled oats","1 ripe banana, mashed","1 scoop plant-based vanilla protein powder","1 cup unsweetened plant milk","1 tbsp ground flax seed","1 tsp baking powder","½ tsp cinnamon","Pinch of salt","1 tsp coconut oil for cooking","Fresh fruit and maple syrup to serve"],
    directions:"Blend rolled oats in a blender until they form a coarse flour. Add banana, protein powder, plant milk, flax seed, baking powder, cinnamon, and salt. Blend until smooth. Let batter rest 5 min to thicken. Heat a non-stick pan or griddle over medium heat and lightly coat with coconut oil. Pour ¼ cup batter per pancake. Cook until bubbles form and edges look dry, about 2-3 min. Flip and cook 1-2 min more. Serve with fresh fruit and a drizzle of maple syrup."},
  // ═══ PLANT-BASED LUNCHES ═══
  {id:"pb-l1",name:"Black Bean & Roasted Sweet Potato Buddha Bowl",mealType:"lunch",tags:["plant-based"],cal:520,fat:16,protein:18,carbs:74,servings:"2 servings",prep:"30 min",
    ingredients:["1 large sweet potato, cubed","1 cup cooked black beans (or one 15-oz can, drained)","1 cup cooked brown rice","2 cups arugula or mixed greens","½ avocado, sliced","¼ cup red cabbage, shredded","2 tbsp tahini","1 tbsp lemon juice","1 tbsp maple syrup","1 tbsp olive oil","½ tsp smoked paprika","½ tsp cumin","Salt and pepper"],
    directions:"Preheat oven to 425°F. Toss sweet potato cubes with olive oil, smoked paprika, cumin, salt, and pepper. Roast 22-25 min until caramelized and tender, flipping halfway. Warm black beans on the stovetop with a pinch of cumin and salt. Whisk together tahini, lemon juice, maple syrup, and 2-3 tbsp water to make dressing. Assemble bowls: brown rice as base, then arugula, roasted sweet potato, black beans, red cabbage, and avocado. Drizzle with tahini dressing."},
  {id:"pb-l2",name:"Red Lentil Soup with Lemon & Cumin",mealType:"lunch",tags:["plant-based"],cal:480,fat:10,protein:22,carbs:72,servings:"4 servings",prep:"35 min",
    ingredients:["1½ cups red lentils, rinsed","1 tbsp olive oil","1 large onion, diced","4 cloves garlic, minced","2 carrots, diced","2 tsp cumin","1 tsp turmeric","½ tsp coriander","¼ tsp cayenne","One 14-oz can diced tomatoes","6 cups vegetable broth","Juice of 1 large lemon","Salt and pepper","Fresh parsley and lemon wedges to serve"],
    directions:"Heat olive oil in a large pot over medium heat. Add onion and cook 5 min until softened. Add garlic, carrots, cumin, turmeric, coriander, and cayenne. Cook 2 min, stirring constantly, until fragrant. Add rinsed lentils, diced tomatoes, and vegetable broth. Bring to a boil, then reduce heat and simmer 20-25 min until lentils are completely soft. Use an immersion blender to partially blend for a creamy-chunky texture, or leave as is. Stir in lemon juice, season with salt and pepper. Serve topped with fresh parsley and extra lemon."},
  {id:"pb-l3",name:"Chickpea Salad Wrap with Avocado",mealType:"lunch",tags:["plant-based"],cal:490,fat:14,protein:20,carbs:66,servings:"2 servings",prep:"10 min",
    ingredients:["One 15-oz can chickpeas, drained and rinsed","½ avocado, mashed","2 tbsp vegan mayo or plain hummus","1 tbsp Dijon mustard","1 stalk celery, finely diced","2 tbsp red onion, finely diced","1 tbsp lemon juice","½ tsp smoked paprika","¼ tsp garlic powder","Salt and pepper","2 large whole grain wraps","1 cup romaine lettuce, shredded","½ cup cherry tomatoes, halved"],
    directions:"In a bowl, roughly mash chickpeas with a fork — you want texture, not paste. Stir in mashed avocado, vegan mayo, Dijon mustard, celery, red onion, lemon juice, smoked paprika, and garlic powder. Season generously with salt and pepper. Lay out whole grain wraps and layer with romaine lettuce and cherry tomatoes. Divide chickpea salad between wraps. Roll tightly, cut in half on the diagonal, and serve."},
  {id:"pb-l4",name:"Quinoa Tabbouleh with White Beans",mealType:"lunch",tags:["plant-based"],cal:450,fat:12,protein:20,carbs:62,servings:"3 servings",prep:"20 min",
    ingredients:["1 cup quinoa, rinsed","2 cups vegetable broth","One 15-oz can white beans (cannellini), drained","1½ cups fresh parsley, finely chopped","½ cup fresh mint, finely chopped","3 Roma tomatoes, diced","1 English cucumber, diced","4 green onions, sliced","3 tbsp extra-virgin olive oil","3 tbsp fresh lemon juice","1 clove garlic, minced","Salt and pepper"],
    directions:"Cook quinoa in vegetable broth per package instructions, about 15 min. Spread on a sheet pan to cool quickly. While quinoa cools, combine parsley, mint, tomatoes, cucumber, and green onions in a large bowl. Add cooled quinoa and drained white beans. Whisk together olive oil, lemon juice, garlic, salt, and pepper. Pour over salad and toss well. Taste and adjust seasoning — tabbouleh should taste bright and lemony. Refrigerate at least 15 min before serving for flavors to develop."},
  // ═══ PLANT-BASED DINNERS ═══
  {id:"pb-d1",name:"Red Lentil Dal with Brown Rice",mealType:"dinner",tags:["plant-based"],cal:540,fat:12,protein:24,carbs:82,servings:"4 servings",prep:"35 min",
    ingredients:["1½ cups red lentils, rinsed","1 cup brown rice","1 tbsp coconut oil","1 large onion, diced","5 cloves garlic, minced","1 tbsp fresh ginger, grated","Two 14-oz cans diced tomatoes","One 14-oz can full-fat coconut milk","2 tsp garam masala","1 tsp turmeric","1 tsp cumin","1 tsp coriander","½ tsp chili powder","Salt to taste","Juice of ½ lemon","Fresh cilantro to serve"],
    directions:"Cook brown rice per package instructions. Heat coconut oil in a large pot over medium heat. Add onion and cook 6-7 min until golden. Add garlic and ginger, cook 2 min until fragrant. Add all spices and stir 1 min. Add rinsed lentils, diced tomatoes, and coconut milk. Bring to a boil, reduce heat, and simmer 20-22 min, stirring occasionally, until lentils are fully soft and dal has thickened. Stir in lemon juice and season with salt. Serve over brown rice, topped with fresh cilantro."},
  {id:"pb-d2",name:"Chickpea Tikka Masala with Cauliflower Rice",mealType:"dinner",tags:["plant-based"],cal:480,fat:14,protein:18,carbs:66,servings:"4 servings",prep:"30 min",
    ingredients:["Two 15-oz cans chickpeas, drained and rinsed","1 medium head cauliflower","1 tbsp coconut oil","1 large onion, diced","4 cloves garlic, minced","1 tbsp fresh ginger, grated","One 14-oz can crushed tomatoes","One 14-oz can full-fat coconut milk","2 tsp garam masala","1 tsp turmeric","1 tsp smoked paprika","1 tsp cumin","½ tsp coriander","Salt and pepper","Fresh cilantro to serve"],
    directions:"Pulse cauliflower in a food processor until it resembles rice. Cook in a dry skillet over medium-high for 5-6 min, season with salt, set aside. Heat coconut oil in a large skillet or pot. Add onion, cook 6 min until softened. Add garlic, ginger, and all spices. Cook 2 min. Add crushed tomatoes, stir and simmer 5 min. Add coconut milk and chickpeas. Simmer 12-15 min until sauce thickens. Season with salt. Serve over cauliflower rice topped with fresh cilantro."},
  {id:"pb-d3",name:"Black Bean Tacos with Mango Avocado Salsa",mealType:"dinner",tags:["plant-based"],cal:510,fat:14,protein:18,carbs:74,servings:"3 servings",prep:"20 min",
    ingredients:["Two 15-oz cans black beans, drained and rinsed","1 tsp cumin","1 tsp chili powder","½ tsp smoked paprika","Salt and pepper","9 small corn tortillas","1 mango, diced","1 avocado, diced","¼ cup red onion, finely diced","¼ cup cilantro, chopped","Juice of 1 lime","1 jalapeño, minced (optional)","2 cups purple cabbage, shredded","Lime wedges to serve"],
    directions:"In a skillet over medium heat, warm black beans with cumin, chili powder, smoked paprika, salt, and pepper. Add 2-3 tbsp water and lightly mash about half the beans with a fork to create a creamy texture. Cook 5 min until heated through. Make salsa: combine mango, avocado, red onion, cilantro, lime juice, and jalapeño. Season with salt. Warm corn tortillas in a dry skillet 30 seconds per side. Assemble tacos: black beans, shredded cabbage, mango avocado salsa. Serve with extra lime wedges."},
  {id:"pb-d4",name:"Tempeh & Broccoli Stir-Fry with Brown Rice",mealType:"dinner",tags:["plant-based"],cal:520,fat:16,protein:28,carbs:62,servings:"2 servings",prep:"25 min",
    ingredients:["8 oz tempeh, cubed","2 cups broccoli florets","1 red bell pepper, sliced","1 cup shredded carrots","3 cloves garlic, minced","1 tbsp fresh ginger, grated","2 tbsp coconut aminos","1 tbsp rice vinegar","1 tbsp toasted sesame oil","1 tsp sriracha (optional)","1 tbsp coconut oil","1 cup cooked brown rice","1 tbsp sesame seeds","2 green onions, sliced"],
    directions:"Whisk together coconut aminos, rice vinegar, sesame oil, and sriracha for the sauce. Heat coconut oil in a wok or large skillet over high heat. Add tempeh cubes and cook 4-5 min, turning, until golden brown on most sides. Remove tempeh from pan. Add broccoli and bell pepper to the hot pan, stir-fry 3 min. Add carrots, garlic, and ginger, cook 1 min. Return tempeh to the pan. Pour sauce over everything and toss 1-2 min until evenly coated and glossy. Serve over brown rice, topped with sesame seeds and green onions."},
  {id:"pb-d5",name:"White Bean & Kale Stew",mealType:"dinner",tags:["plant-based"],cal:460,fat:10,protein:22,carbs:66,servings:"4 servings",prep:"30 min",
    ingredients:["Two 15-oz cans white beans (cannellini), drained and rinsed","1 bunch lacinato kale, stems removed, chopped","1 tbsp olive oil","1 large onion, diced","4 cloves garlic, minced","2 carrots, sliced","2 stalks celery, sliced","One 14-oz can diced tomatoes","4 cups vegetable broth","1 tsp dried rosemary","1 tsp dried thyme","1 bay leaf","Salt and pepper","Juice of ½ lemon","Red pepper flakes to taste"],
    directions:"Heat olive oil in a large pot over medium heat. Add onion, carrots, and celery. Cook 6-7 min until softened. Add garlic, rosemary, thyme, and bay leaf. Cook 1-2 min until fragrant. Add diced tomatoes and vegetable broth. Bring to a boil. Add one can of white beans. Roughly mash the second can of beans and stir in — this creates a thick, creamy broth. Reduce heat and simmer 15 min. Add kale and stir until wilted, about 3-4 min. Remove bay leaf. Stir in lemon juice, season generously with salt, pepper, and red pepper flakes. Serve with crusty whole grain bread."},

const MEAL_MAP = {1:["Main Meal"],2:["Breakfast","Dinner"],3:["Breakfast","Lunch","Dinner"],4:["Breakfast","Lunch","Dinner","Snack"],5:["Breakfast","Snack","Lunch","Snack","Dinner"]};
const TYPE_MAP = {1:["dinner"],2:["breakfast","dinner"],3:["breakfast","lunch","dinner"],4:["breakfast","lunch","dinner","snack"],5:["breakfast","snack","lunch","snack","dinner"]};
const SPLIT_MAP = {1:[1.0],2:[.40,.60],3:[.30,.35,.35],4:[.25,.30,.30,.15],5:[.20,.10,.30,.10,.30]};

function detectProtein(r){
  const txt=((r.name||"")+" "+(r.ingredients||[]).join(" ")).toLowerCase();
  if(/chicken|turkey|poultry/.test(txt))return"chicken";
  if(/salmon|tuna|tilapia|cod|halibut|sardine|shrimp|seafood|fish|trout|mahi|anchov/.test(txt))return"fish";
  if(/beef|steak|bison|burger|flank|sirloin|ribeye|chuck|ground beef/.test(txt))return"beef";
  if(/pork|bacon|ham|prosciutto|lamb|sausage/.test(txt))return"pork";
  if(/tofu|tempeh|lentil|bean|chickpea|edamame|seitan|falafel|plant.based|vegan/.test(txt))return"plant";
  if(/\begg\b/.test(txt))return"egg";
  if(/cottage cheese|greek yogurt|ricotta/.test(txt))return"dairy";
  return"other";
}

function matchRecipes(dietName, mealType, proteinPrefs) {
  const tag = dietName.toLowerCase().replace(/[^a-z]/g,"");
  const mapped = {keto:"keto",paleo:"paleo",mediterranean:"mediterranean",plantbased:"plant-based",zone403030:"keto",antiinflammatory:"anti-inflammatory",lowfodmap:"low-fodmap",custom:null}[tag]||null;
  let pool = RECIPES.filter(r=>r.mealType===mealType||(mealType==="snack"&&r.mealType==="side"));
  if(mapped){const f=pool.filter(r=>r.tags.includes(mapped));if(f.length>0)pool=f;}
  if(proteinPrefs&&proteinPrefs.length>0){const f=pool.filter(r=>proteinPrefs.includes(detectProtein(r)));if(f.length>=2)pool=f;}
  return pool;
}

function scaleRecipe(r,targetCal){const ratio=targetCal/r.cal;return{...r,cal:Math.round(targetCal),fat:Math.round(r.fat*ratio),protein:Math.round(r.protein*ratio),carbs:Math.round(r.carbs*ratio)};}

function generateLibraryPlan(cfg){
  const{dietName,calories,mealsPerDay,days,snacksPerDay,proteinPrefs,snackPref}=cfg;
  const splits=SPLIT_MAP[mealsPerDay]||SPLIT_MAP[3];
  const labels=MEAL_MAP[mealsPerDay]||MEAL_MAP[3];
  const types=TYPE_MAP[mealsPerDay]||TYPE_MAP[3];
  const plan=[];
  for(let d=0;d<days;d++){
    // Pick snacks first so we know the calorie budget for meals
    const snacks=[];
    let snackCals=0;
    for(let s=0;s<(snacksPerDay||0);s++){
      let sPool=SNACK_ITEMS;if(snackPref&&snackPref!=="any"){const f=SNACK_ITEMS.filter(x=>x.cat===snackPref);if(f.length>0)sPool=f;}
      const idx=(d*7+s*13+d*s*3)%sPool.length;const pick=sPool[idx];
      snacks.push({label:`Snack ${s+1}`,...pick});
      snackCals+=pick.cal;
    }
    const mealCalBudget=Math.max(calories-snackCals,400); // floor at 400 to prevent absurdly low meals
    const meals=[];
    for(let m=0;m<mealsPerDay;m++){
      const pool=matchRecipes(dietName,types[m],proteinPrefs);
      const pick=pool[(d*mealsPerDay+m)%pool.length];
      const targetCal=Math.round(mealCalBudget*splits[m]);
      meals.push({label:labels[m],...scaleRecipe(pick,targetCal)});
    }
    plan.push({day:d+1,meals,snacks});
  }
  return plan;
}

async function generateAIPlan(cfg,apiKey){
  const{dietName,calories,proteinPct,carbsPct,fatPct,mealsPerDay,days,notes,proteinPrefs}=cfg;
  const proteinLine=proteinPrefs&&proteinPrefs.length>0?`Protein sources to prioritize: ${proteinPrefs.join(", ")}`:"";
  const prompt=`You are a clinical nutrition expert. Create a ${days}-day meal plan.\n\nDiet: ${dietName}\nCalories: ${calories}/day\nMacros: ${proteinPct}% protein, ${carbsPct}% carbs, ${fatPct}% fat\nMeals/day: ${mealsPerDay}\n${proteinLine?proteinLine+"\n":""}${notes?`Notes: ${notes}`:""}\n\nFor EACH meal provide: name, calories, protein(g), carbs(g), fat(g), ingredients list, directions, prepTime.\n\nRespond ONLY with valid JSON, no markdown:\n{"plan":[{"day":1,"meals":[{"label":"Breakfast","name":"...","calories":400,"protein":30,"carbs":20,"fat":25,"ingredients":["..."],"directions":"...","prepTime":"15 min"}]}]}`;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:8000,messages:[{role:"user",content:prompt}]})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||"API error "+r.status);}const d=await r.json();const t=d.content?.map(i=>i.text||"").join("\n")||"";
  return JSON.parse(t.replace(/```json|```/g,"").trim()).plan;
}
