                    <span style={s.badge(C.fat)}>F {meal.fat}g</span>
                    <span style={{fontSize:14,fontWeight:700,fontFamily:F.m,color:C.text,minWidth:58,textAlign:"right"}}>{meal.cal} cal</span>
                    <span className="no-print" style={{fontSize:14,color:C.muted,transform:isExp?"rotate(180deg)":"rotate(0)",transition:"transform .25s",marginLeft:2}}>▾</span>
                  </div>
                </div>
              </div>
              {/* ── Expanded detail ── */}
              {isExp&&(<div style={{borderTop:`1px solid ${C.border}`}}>
                {img&&<div style={{width:"100%",height:200,overflow:"hidden",position:"relative"}} className="no-print">
                  <img src={img} alt={meal.name} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <div style={{position:"absolute",inset:0,background:"linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 60%)"}}/>
                  <div style={{position:"absolute",bottom:14,left:18,color:"#fff",fontFamily:F.h,fontSize:18,fontWeight:600,textShadow:"0 1px 4px rgba(0,0,0,.5)"}}>{meal.name}</div>
                  {(meal.prepTime||meal.prep)&&<div style={{position:"absolute",bottom:14,right:18,color:"rgba(255,255,255,.8)",fontSize:11}}>⏱ {meal.prepTime||meal.prep}</div>}
                </div>}
                <div style={{padding:"18px 22px 20px",background:C.alt}}>
                  <div style={s.g2} className="rg">
                    <div><div style={{...s.lbl,marginBottom:8}}>Ingredients</div>
                      {(meal.ingredients||[]).map((ing,i)=>(<div key={i} style={{fontSize:13,padding:"5px 0",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"flex-start",gap:6}}><span style={{color:C.accent,marginTop:1,flexShrink:0}}>·</span>{ing}</div>))}
                    </div>
                    <div><div style={{...s.lbl,marginBottom:8}}>Directions</div>
                      <p style={{fontSize:13,lineHeight:1.8,margin:0,color:C.text}}>{meal.directions}</p>
                      {meal.servings&&<div style={{marginTop:10,fontSize:12,color:C.muted,fontStyle:"italic",borderTop:`1px solid ${C.border}`,paddingTop:8}}>Yield: {meal.servings}</div>}
                    </div>
                  </div>
                </div>
              </div>)}
            </div>);})}
          {(day.snacks||[]).length>0&&(<>
            {day.snacks.map((snack,si)=>(
              <div key={`snack-${si}`} style={{...s.card,padding:0,marginBottom:8,background:C.alt,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"stretch",minHeight:72}}>
                  {snack.img&&<div style={{width:90,minWidth:90,flexShrink:0,overflow:"hidden",background:"#fff"}} className="no-print">
                    <img src={snack.img} alt={snack.name} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  </div>}
                  <div style={{flex:1,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                    <div>
                      <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",color:"#B8860B",marginBottom:2}}>{snack.label}</div>
                      <div style={{fontSize:14,fontWeight:600,fontFamily:F.h,lineHeight:1.3}}>{snack.name}</div>
                      {snack.note&&<div style={{fontSize:11,color:C.muted,fontStyle:"italic",marginTop:1}}>{snack.note}</div>}
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
                      <span style={s.badge(C.protein)}>P {snack.protein}g</span>
                      <span style={s.badge(C.carbs)}>C {snack.carbs}g</span>
                      <span style={s.badge(C.fat)}>F {snack.fat}g</span>
                      <span style={{fontSize:14,fontWeight:700,fontFamily:F.m,color:C.text}}>{snack.cal} cal</span>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </>)}{(() => {
            const mealTotal = day.meals.reduce((a, m) => a + (m.cal || m.calories || 0), 0);
            const snackTotal = (day.snacks || []).reduce((a, s) => a + s.cal, 0);
            const dayTotal = mealTotal + snackTotal;
            return (<div style={{display:"flex",justifyContent:"flex-end",padding:"8px 22px",fontSize:13,color:C.muted,gap:16}}>
              <span>Meals: {mealTotal} cal</span>
              {snackTotal>0&&<span>Snacks: {snackTotal} cal</span>}
              <span style={{fontWeight:700,color:C.text}}>Daily Total: {dayTotal} cal</span>
            </div>);
          })()}        </div>))}
        <div style={{textAlign:"center",padding:"30px 0 12px",color:C.muted,fontSize:11}}>
          <div style={{fontFamily:F.h,fontWeight:600,fontSize:14,color:C.accent,marginBottom:3}}>The Lazarus Method</div>
          <div>This nutrition plan is for educational purposes and should be used under practitioner guidance.</div>
          <div style={{marginTop:3}}>Generated {new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}</div>
        </div>
      </div>
    </div>);
  }

  // ─── SETUP VIEW ────────────────────────────────────────────────
  return(<div style={s.wrap}>
    <style>{`input[type=range]{height:5px}input:focus,select:focus{border-color:${C.borderFocus}!important}button:hover{opacity:.88}@media(max-width:640px){.rg{grid-template-columns:1fr!important}}`}</style>
    <div style={s.hdr}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><h1 style={s.hdrT}>Meal Plan Generator</h1><div style={s.hdrS}>The Lazarus Method</div></div><img src={LOGO_IMG} alt="Lazarus Method" style={{height:54,width:54,objectFit:"contain",opacity:0.92}}/></div></div>
    <div style={s.main}>
      <div style={s.card}>
        <div style={{fontSize:15,fontFamily:F.h,fontWeight:600,marginBottom:12}}>Diet Protocol</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(145px,1fr))",gap:7}}>
          {DIETS.map((d,i)=>(<button key={i} onClick={()=>pickDiet(i)} style={{padding:"10px 12px",borderRadius:7,border:`1.5px solid ${dietIdx===i?C.accent:C.border}`,background:dietIdx===i?C.accent+"0D":C.surface,cursor:"pointer",textAlign:"left",fontFamily:F.b,transition:"all .15s"}}>
            <div style={{fontSize:13,fontWeight:600,color:dietIdx===i?C.accent:C.text}}>{d.name}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:1}}>{d.desc}</div>
          </button>))}
        </div>
        <div style={{fontSize:12,color:C.muted,marginTop:10}}>{recipeCount} recipes available in library for this protocol</div>
      </div>
      <div style={s.card}><div style={s.g2} className="rg">
        <div><label style={s.lbl}>Daily Calories (kcal)</label><input type="number" value={cal} onChange={e=>setCal(Math.max(800,parseInt(e.target.value)||800))} style={s.inp} min={800} max={6000} step={50}/></div>
        <div><label style={s.lbl}>Patient Name (optional)</label><input type="text" value={patient} onChange={e=>setPatient(e.target.value)} placeholder="For personalized header" style={s.inp}/></div>
      </div></div>
      <div style={s.card}>
        <div style={{fontSize:15,fontFamily:F.h,fontWeight:600,marginBottom:14}}>
          Macronutrient Split
          <span style={{fontSize:12,fontWeight:400,color:total===100?C.protein:"#c0392b",marginLeft:10,fontFamily:F.b}}>Total: {total}%{total!==100?" (must equal 100%)":""}</span>
        </div>
        <div style={{display:"flex",height:10,borderRadius:5,overflow:"hidden",marginBottom:18}}>
          <div style={{width:`${pro}%`,background:C.protein,transition:"width .3s"}}/>
          <div style={{width:`${carb}%`,background:C.carbs,transition:"width .3s"}}/>
          <div style={{width:`${fat}%`,background:C.fat,transition:"width .3s"}}/>
        </div>
        <div style={s.g3} className="rg">
          {[{l:"Protein",v:pro,set:v=>adj("p",v),c:C.protein,g:Math.round((cal*pro/100)/4)},{l:"Carbohydrates",v:carb,set:v=>adj("c",v),c:C.carbs,g:Math.round((cal*carb/100)/4)},{l:"Fat",v:fat,set:v=>adj("f",v),c:C.fat,g:Math.round((cal*fat/100)/9)}].map(m=>(
            <div key={m.l} style={{padding:14,borderRadius:8,background:m.c+"0A",border:`1px solid ${m.c}20`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                <span style={{fontSize:12,fontWeight:600,color:m.c}}>{m.l}</span>
                <span style={{fontSize:22,fontWeight:700,color:m.c,fontFamily:F.h}}>{m.v}%</span>
              </div>
              <input type="range" min={0} max={100} value={m.v} onChange={e=>m.set(parseInt(e.target.value))} style={{width:"100%",accentColor:m.c,cursor:"pointer",marginTop:6}}/>
              <div style={{fontSize:11,color:C.muted,marginTop:3}}>{m.g}g per day</div>
            </div>))}
        </div>
      </div>
      <div style={s.card}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:14,marginBottom:snacksPerDay>0?14:0}} className="rg">
          <div><label style={s.lbl}>Meals Per Day</label><select value={mpd} onChange={e=>setMpd(parseInt(e.target.value))} style={s.sel}><option value={1}>1 Meal</option><option value={2}>2 Meals</option><option value={3}>3 Meals</option><option value={4}>4 Meals</option></select></div>
          <div><label style={s.lbl}>Snacks Per Day</label><select value={snacksPerDay} onChange={e=>setSnacksPerDay(parseInt(e.target.value))} style={s.sel}><option value={0}>No Snacks</option><option value={1}>1 Snack</option><option value={2}>2 Snacks</option><option value={3}>3 Snacks</option></select></div>
          <div><label style={s.lbl}>Number of Days</label><select value={days} onChange={e=>setDays(parseInt(e.target.value))} style={s.sel}>{[1,3,5,7,14].map(d=><option key={d} value={d}>{d} {d===1?"Day":"Days"}</option>)}</select></div>
          <div><label style={s.lbl}>Special Notes</label><input type="text" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Allergies, preferences..." style={s.inp}/></div>
        </div>
        {snacksPerDay>0&&(
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14}}>
            <label style={s.lbl}>Snack Preference</label>
            <select value={snackPref} onChange={e=>setSnackPref(e.target.value)} style={{...s.sel,maxWidth:320}}>
              <option value="any">No Preference — Rotate All Options</option>
              <option value="bar">Bars &amp; Portables (protein bars, energy bars)</option>
              <option value="savory">Savory &amp; Meat-Based (jerky, sardines, turkey, eggs)</option>
              <option value="sweet">Sweet &amp; Shakes (WW protein shakes, sweet bars)</option>
              <option value="whole">Whole Foods (nuts, dairy, yogurt, cottage cheese)</option>
              <option value="protein">WW Protein Only (Wellness Warrior shakes)</option>
            </select>
          </div>
        )}
      </div>
      <div style={s.card}>
        <div style={{fontSize:15,fontFamily:F.h,fontWeight:600,marginBottom:4}}>Protein Preferences</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>Select preferred protein sources. Library generation will prioritize these. Leave blank to include all options.</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {[
            {id:"chicken",label:"🐔 Chicken / Turkey"},
            {id:"fish",label:"🐟 Fish & Seafood"},
            {id:"beef",label:"🥩 Beef & Steak"},
            {id:"pork",label:"🐷 Pork & Lamb"},
            {id:"plant",label:"🌿 Plant-Based"},
            {id:"egg",label:"🥚 Eggs"},
            {id:"dairy",label:"🧀 Dairy"},
          ].map(p=>{
            const on=proteinPrefs.includes(p.id);
            return(
              <button key={p.id} onClick={()=>setProteinPrefs(prev=>on?prev.filter(x=>x!==p.id):[...prev,p.id])}
                style={{padding:"8px 16px",borderRadius:20,border:`1.5px solid ${on?C.accent:C.border}`,background:on?C.accent:"transparent",color:on?C.white:C.text,fontSize:13,fontWeight:on?600:400,cursor:"pointer",fontFamily:F.b,transition:"all .15s"}}>
                {p.label}
              </button>
            );
          })}
          {proteinPrefs.length>0&&(
            <button onClick={()=>setProteinPrefs([])} style={{padding:"8px 14px",borderRadius:20,border:`1.5px solid #FECACA`,background:"#FEF2F2",color:"#991B1B",fontSize:12,cursor:"pointer",fontFamily:F.b}}>
              Clear All
            </button>
          )}
        </div>
        {proteinPrefs.length>0&&<div style={{fontSize:11,color:C.accent,marginTop:10,fontWeight:600}}>✓ Filtering for: {proteinPrefs.join(", ")}</div>}
      </div>
      {err&&<div style={{...s.card,background:"#FEF2F2",borderColor:"#FECACA",color:"#991B1B",fontSize:13}}>{err}</div>}
      <div style={{...s.card,borderColor:"#C9BCAA",background:"#FAF8F4"}}>
        <label style={{...s.lbl,display:"block",marginBottom:6}}>Anthropic API Key <span style={{fontWeight:400,color:C.muted,fontSize:11}}>(required for AI generation only)</span></label>
        <input type="password" value={apiKey} onChange={e=>{const v=e.target.value;setApiKey(v);try{localStorage.setItem('lm_api_key',v);}catch(x){}}} placeholder="sk-ant-api03-..." style={{...s.inp,width:"100%",boxSizing:"border-box",fontFamily:F.m,letterSpacing:1}}/>
        <div style={{fontSize:11,color:C.muted,marginTop:5}}>Stored in your browser only — never sent anywhere except the Anthropic API. Library generation works without a key.</div>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:6,flexWrap:"wrap"}}>
        <button style={{...s.btn1,padding:"14px 34px",fontSize:16,opacity:loading||total!==100?.5:1}} onClick={genAI} disabled={loading||total!==100}>{loading?"Generating...":"Generate with AI"}</button>
        <button style={{...s.btn2,padding:"13px 34px",fontSize:16,opacity:loading||total!==100?.5:1}} onClick={genLib} disabled={loading||total!==100}>Generate from Library</button>
      </div>
      <div style={{textAlign:"center",fontSize:11,color:C.muted,marginTop:10,maxWidth:520,margin:"10px auto 0"}}>
        <strong>AI</strong> creates unique meals each time (review before patient handoff). <strong>Library</strong> pulls from {RECIPES.length} curated recipes + {SNACK_ITEMS.length} grab-and-go snack options.
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(MealPlanner));

  </script>
</body>
</html>
