<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lazarus Method — 10-Day Mobility Challenge</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap");
:root{--gold:#96792F;--gold-soft:#B8975A;--gold-bg:#FAF6ED;--navy:#1A1A2E;--charcoal:#3A3A3A;--med:#8A8A8A;--subtle:#BBBBBB;--cream:#FDFBF7;--white:#FFFFFF;--border:#E8E0D0;--green:#3A6A3A;--green-bg:#EFF5EF;--red:#8B3A3A;--red-bg:#F5EDED;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"EB Garamond",Georgia,serif;background:#F0EDE6;color:var(--charcoal);min-height:100vh;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
.shell{max-width:600px;margin:0 auto;padding:16px 16px 40px;overflow-x:hidden;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;}
.top-logo{width:40px;height:40px;}
.top-brand{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:9px;letter-spacing:4px;color:var(--gold-soft);text-transform:uppercase;font-weight:600;}
.top-actions{display:flex;gap:8px;}
.top-btn{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;border:1px solid var(--border);background:var(--white);color:var(--med);border-radius:3px;padding:6px 14px;cursor:pointer;transition:all 0.2s;touch-action:manipulation;}
.top-btn:hover{border-color:var(--charcoal);color:var(--charcoal);}
.top-btn.danger{color:var(--red);border-color:var(--red);}

.timeline{display:flex;align-items:center;gap:0;margin-bottom:20px;}
.tl-dot{width:28px;height:28px;min-width:28px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;font-weight:700;color:var(--subtle);transition:all 0.3s;}
.tl-dot.current{border-color:var(--gold);background:var(--gold);color:var(--white);transform:scale(1.15);box-shadow:0 2px 10px rgba(150,121,47,0.3);}
.tl-dot.complete{border-color:var(--green);background:var(--green);color:var(--white);}
.tl-dot.skipped{border-color:var(--red);background:var(--red);color:var(--white);}
.tl-dot.future{opacity:0.35;}
.tl-line{flex:1;height:2px;background:var(--border);}.tl-line.done{background:var(--green);}.tl-line.skip-line{background:var(--red);}

.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:12px 8px;text-align:center;}
.stat-value{font-family:"EB Garamond",Georgia,serif;font-size:26px;font-weight:700;line-height:1;}
.stat-value.green{color:var(--green);}.stat-value.navy{color:var(--navy);}.stat-value.gold{color:var(--gold);}
.stat-label{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--med);font-weight:600;margin-top:3px;}

.card{background:var(--white);border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,0.06);overflow:hidden;margin-bottom:16px;}
.card-header{background:var(--navy);color:var(--white);padding:20px 24px;text-align:center;}
.card-day{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:var(--gold-soft);margin-bottom:6px;}
.card-title{font-size:22px;font-weight:700;}
.card-body{padding:24px;}

/* MOVE LIST */
.move-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.move-item{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border:2px solid var(--border);border-radius:8px;background:var(--cream);cursor:pointer;transition:all 0.25s;user-select:none;touch-action:manipulation;}
.move-item:hover{border-color:var(--gold-soft);transform:translateY(-1px);}
.move-item.done{border-color:var(--green);background:var(--green-bg);}
.move-emoji{font-size:24px;flex-shrink:0;padding-top:2px;}
.move-info{flex:1;}
.move-name{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.move-detail{font-size:13px;color:var(--med);line-height:1.4;}
.move-check{width:24px;height:24px;min-width:24px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:all 0.2s;flex-shrink:0;margin-top:4px;}
.move-item.done .move-check{background:var(--green);border-color:var(--green);color:var(--white);}
.move-count{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;color:var(--med);font-weight:600;text-align:center;margin-bottom:20px;min-height:14px;}
.move-count strong{color:var(--green);}

/* BODY FEEL */
.feel-section{text-align:center;margin-bottom:24px;}
.feel-label{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--navy);margin-bottom:12px;}
.feel-row{display:flex;justify-content:center;gap:8px;}
.feel-btn{width:48px;height:48px;border-radius:10px;border:2px solid var(--border);background:var(--cream);font-size:24px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.feel-btn:hover{border-color:var(--gold);transform:scale(1.08);}
.feel-btn.active{border-color:var(--navy);background:var(--gold-bg);transform:scale(1.12);box-shadow:0 3px 10px rgba(26,26,46,0.12);}
.feel-text{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;color:var(--med);font-weight:600;margin-top:8px;min-height:14px;}

/* TIGHT SPOTS */
.spots-section{margin-bottom:24px;}
.spots-label{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--navy);margin-bottom:12px;text-align:center;}
.spots-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;}
.spot-chip{padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:var(--cream);font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:11px;font-weight:600;color:var(--charcoal);cursor:pointer;transition:all 0.2s;user-select:none;touch-action:manipulation;}
.spot-chip:hover{border-color:var(--gold-soft);transform:translateY(-1px);}
.spot-chip.selected{background:var(--red);color:var(--white);border-color:var(--red);}

.complete-btn{display:block;width:100%;padding:16px;border:none;border-radius:6px;background:var(--navy);color:var(--white);font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all 0.2s;touch-action:manipulation;}
.complete-btn:hover{background:#2A2A4E;transform:translateY(-1px);}
.complete-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none;}

.history-toggle{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;cursor:pointer;user-select:none;}
.history-toggle-text{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--med);}
.history-toggle-arrow{font-size:12px;color:var(--med);transition:transform 0.2s;}
.history-toggle.open .history-toggle-arrow{transform:rotate(180deg);}
.history-list{display:none;flex-direction:column;gap:6px;margin-bottom:16px;}
.history-list.open{display:flex;}
.history-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);border:1px solid var(--border);border-radius:6px;}
.history-item.done-day{border-left:4px solid var(--green);}.history-item.skip-day{border-left:4px solid var(--red);}
.history-day{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:var(--navy);min-width:44px;}
.history-detail{flex:1;font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:11px;color:var(--med);}
.history-badge{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:12px;}
.history-badge.done{background:var(--green-bg);color:var(--green);}.history-badge.skipped{background:var(--red-bg);color:var(--red);}

.intro-card{background:var(--white);border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,0.06);padding:28px 24px;margin-bottom:16px;text-align:center;}
.intro-card h2{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:16px;}
.intro-card p{font-size:15px;line-height:1.7;color:var(--charcoal);margin-bottom:12px;}
.intro-box{background:var(--gold-bg);border:1px solid var(--gold);border-radius:4px;padding:16px 20px;margin:20px 0;text-align:left;}
.intro-box p{font-size:14px;line-height:1.6;margin-bottom:6px;}.intro-box p:last-child{margin-bottom:0;}
.start-btn{display:block;width:100%;padding:16px;border:none;border-radius:6px;background:var(--gold);color:var(--white);font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:24px;touch-action:manipulation;}
.start-btn:hover{background:#7A6428;transform:translateY(-1px);}

.done-card{background:var(--white);border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,0.06);padding:36px 24px;text-align:center;margin-bottom:16px;}
.done-emoji{font-size:48px;margin-bottom:12px;}
.done-title{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.done-sub{font-size:14px;color:var(--med);font-style:italic;margin-bottom:20px;line-height:1.6;}
.done-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.done-stat{background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:14px 8px;text-align:center;}
.done-stat-val{font-family:"EB Garamond",Georgia,serif;font-size:28px;font-weight:700;line-height:1;}
.done-stat-val.green{color:var(--green);}.done-stat-val.gold{color:var(--gold);}.done-stat-val.red{color:var(--red);}
.done-stat-label{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--med);font-weight:600;margin-top:4px;}
.done-hotspot{margin-top:20px;background:var(--red-bg);border:1px solid #E0CCCC;border-radius:6px;padding:16px;text-align:left;}
.done-hotspot-title{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--red);margin-bottom:8px;}
.done-hotspot-list{font-size:14px;color:var(--charcoal);line-height:1.6;}
.done-message{font-size:15px;font-weight:700;color:var(--navy);line-height:1.6;margin-top:20px;}

.footer{text-align:center;padding:20px 0;border-top:1px solid var(--border);margin-top:12px;}
.footer-text{font-size:11px;color:var(--subtle);font-style:italic;}
.footer-copy{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:9px;color:var(--subtle);margin-top:4px;letter-spacing:0.5px;}

@media(max-width:480px){
  .shell{padding:12px 12px 32px;}.stats-row{gap:6px;}.stat-value{font-size:22px;}.stat-label{font-size:7px;}
  .card-body{padding:18px 16px;}.card-header{padding:16px 18px;}.card-title{font-size:18px;}
  .move-item{padding:12px 14px;gap:10px;}.move-name{font-size:12px;}.move-detail{font-size:12px;}
  .feel-btn{width:44px;height:44px;font-size:20px;}
  .complete-btn,.start-btn{padding:14px;font-size:12px;}
  .intro-card{padding:22px 16px;}.intro-card h2{font-size:18px;}.intro-card p{font-size:14px;}.intro-box p{font-size:13px;}
  .done-card{padding:28px 16px;}.done-stat-val{font-size:24px;}
  .done-stats{grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .tl-dot{width:24px;height:24px;min-width:24px;font-size:9px;}
  .spot-chip{padding:7px 12px;font-size:10px;}
  .history-item{padding:10px 12px;gap:8px;}
  .history-day{font-size:9px;min-width:38px;}
  .history-detail{font-size:10px;}
  .top-brand{font-size:8px;letter-spacing:3px;}
  .top-btn{font-size:9px;padding:5px 10px;}
  .done-hotspot{padding:14px 14px;}
  .mapping-row{padding:10px 12px;gap:8px;flex-wrap:wrap;}
  .mapping-select{min-width:120px;font-size:13px;}
  .summary-row{padding:8px 0;gap:8px;}
  .focus-card{padding:10px 12px;gap:8px;}
}

@media(max-width:360px){
  .tl-dot{width:22px;height:22px;min-width:22px;font-size:8px;}
  .stats-row{grid-template-columns:1fr 1fr 1fr;gap:4px;}
  .stat-value{font-size:20px;}
  .feel-btn{width:40px;height:40px;font-size:18px;}
  .spot-chip{padding:6px 10px;font-size:9px;}
  .move-item{padding:10px 10px;gap:8px;}
  .move-emoji{font-size:20px;}
  .history-item{padding:8px 10px;gap:6px;}
  .done-stats{gap:6px;}.done-stat{padding:10px 6px;}.done-stat-val{font-size:20px;}
  .mapping-row{gap:6px;}.mapping-select{min-width:100px;font-size:12px;padding:6px 8px;}
  .mapping-chakra{font-size:10px;}
}
@media print{
  body{background:white !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .top-actions,.complete-btn,.start-btn{display:none !important;}
  .card,.intro-card,.done-card{box-shadow:none;break-inside:avoid;page-break-inside:avoid;}
  .card-header{background:#1A1A2E !important;color:white !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .tl-dot.current{background:#96792F !important;border-color:#96792F !important;color:white !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .tl-dot.complete{background:#3A6A3A !important;border-color:#3A6A3A !important;color:white !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .move-item.done{background:#EFF5EF !important;border-color:#3A6A3A !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .spot-chip.selected{background:#8B3A3A !important;color:white !important;border-color:#8B3A3A !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .history-list{display:flex !important;}
}

  /* ============================================
     MOBILE RESPONSIVE OVERRIDES
     Auto-patched for vertical mobile viewing
     ============================================ */
  body {
    overflow-x: hidden;
  }

  /* Common container selectors — constrain to viewport width */
  .input-inner, .patient-inner, .main, .main-wrap, .report-wrap,
  .container, .shell, .prog-wrap, #document, #doc,
  .worksheet-inner, .card-inner, .content-wrap, .page-wrap,
  .section-wrap, .inner, .wrapper {
    max-width: 100% !important;
    width: 100% !important;
    box-sizing: border-box !important;
  }

  @media (max-width: 640px) {

    /* Prevent iOS from zooming on input focus */
    input, select, textarea, button {
      font-size: 16px !important;
    }

    /* Stack any side-by-side layouts */
    .grid, .two-col, .three-col, .columns,
    [style*="display:flex"], [style*="display: flex"] {
      flex-direction: column !important;
    }

    /* Make tables scroll rather than overflow */
    table {
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
    }

    /* Ensure padding on body for breathing room */
    body {
      padding-left: 12px !important;
      padding-right: 12px !important;
    }

    /* Override any remaining fixed-width elements */
    [style*="width:"] {
      max-width: 100% !important;
    }
  }

</style>

const STORAGE_KEY="tlm_mobility";

function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch(e){}return{started:false,currentDay:0,days:{}};}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}
let state=loadState();
let tempMoves=[],tempFeel=null,tempSpots=[];

function render(){
  renderTimeline();
  document.getElementById("viewIntro").innerHTML="";document.getElementById("viewDay").innerHTML="";document.getElementById("viewDone").innerHTML="";
  if(!state.started){renderIntro();return;}
  if(state.currentDay>10){renderComplete();return;}
  renderStats();renderDailyCard();renderHistory();
}

function renderTimeline(){
  const el=document.getElementById("timeline");let html="";
  for(let i=1;i<=10;i++){const d=state.days[i];let cls="tl-dot";
  if(d&&d.complete){cls+=d.did?" complete":" skipped";}else if(i===state.currentDay){cls+=" current";}else{cls+=" future";}
  html+='<div class="'+cls+'">'+i+'</div>';if(i<10){let lc="tl-line";if(d&&d.complete)lc+=d.did?" done":" skip-line";html+='<div class="'+lc+'"></div>';}}
  el.innerHTML=html;
}

function renderStats(){
  document.getElementById("statsRow").style.display="";document.getElementById("historyWrap").style.display=state.currentDay>1?"":"none";
  document.getElementById("statDay").textContent=state.currentDay+"/10";
  let totalMoves=0,done=0;
  Object.values(state.days).forEach(d=>{if(d.did){done++;totalMoves+=d.movesCompleted||0;}});
  document.getElementById("statMoves").textContent=totalMoves;document.getElementById("statDone").textContent=done;
}

    <p>Mobility is the foundation of movement. Without it, strength is limited, recovery is slower, and injury risk goes up. This challenge targets a different area of your body each day in under 10 minutes.</p>
    <div class="intro-box">
      <p><strong>Day 1:</strong> Hips &amp; Hip Flexors</p>
      <p><strong>Day 2:</strong> Thoracic Spine &amp; Back</p>
      <p><strong>Day 3:</strong> Shoulders &amp; Upper Back</p>
      <p><strong>Day 4:</strong> Ankles &amp; Calves</p>
      <p><strong>Day 5:</strong> Full Body Flow</p>

      <p><strong>Day 7:</strong> Wrists &amp; Forearms</p>

  </div>`;

function renderDailyCard(){
  const day=DAYS[state.currentDay-1];
  let movesHTML=day.moves.map((m,i)=>'<div class="move-item" data-idx="'+i+'" onclick="toggleMove('+i+')"><div class="move-emoji">'+m.emoji+'</div><div class="move-info"><div class="move-name">'+m.name+'</div><div class="move-detail">'+m.detail+'</div></div><div class="move-check">&#10003;</div></div>').join("");
  let spotsHTML=BODY_SPOTS.map(s=>'<div class="spot-chip" data-spot="'+s+'" onclick="toggleSpot(this)">'+s+'</div>').join("");
  let feelBtns='<div class="feel-btn" data-feel="1" onclick="setFeel(1)">&#129468;</div><div class="feel-btn" data-feel="2" onclick="setFeel(2)">&#128556;</div><div class="feel-btn" data-feel="3" onclick="setFeel(3)">&#128528;</div><div class="feel-btn" data-feel="4" onclick="setFeel(4)">&#128170;</div><div class="feel-btn" data-feel="5" onclick="setFeel(5)">&#129336;</div>';

  document.getElementById("viewDay").innerHTML=`
  <div class="card">
    <div class="card-header"><div class="card-day">Day ${day.num} of 10 &middot; ${day.focus}</div><div class="card-title">${day.title}</div></div>
    <div class="card-body">
      <p style="font-size:14px;color:var(--med);font-style:italic;margin-bottom:16px;text-align:center;">Tap each move as you complete it.</p>
      <div class="move-list" id="moveList">${movesHTML}</div>
      <div class="move-count" id="moveCount"></div>

      <div class="spots-section"><div class="spots-label">Where do you feel tightest today?</div><div class="spots-grid">${spotsHTML}</div></div>

      <div class="feel-section"><div class="feel-label">Overall mobility rating</div><div class="feel-row">${feelBtns}</div><div class="feel-text" id="feelText"></div></div>

      <button class="complete-btn" id="completeBtn" disabled onclick="completeDay()">Complete Day ${day.num}</button>
    </div>
  </div>`;
}

function renderComplete(){
  document.getElementById("statsRow").style.display="none";document.getElementById("historyWrap").style.display="";
  document.getElementById("historyToggle").classList.add("open");document.getElementById("historyList").classList.add("open");
  renderHistory();
  let done=0,totalMoves=0,allSpots={};
  Object.values(state.days).forEach(d=>{if(d.did){done++;totalMoves+=d.movesCompleted||0;}if(d.spots)d.spots.forEach(s=>{allSpots[s]=(allSpots[s]||0)+1;});});
  const sorted=Object.entries(allSpots).sort((a,b)=>b[1]-a[1]);
  const hotspots=sorted.slice(0,3).map(s=>s[0]+" ("+s[1]+"x)").join(", ");

  document.getElementById("viewDone").innerHTML=`
  <div class="done-card">
    <div class="done-emoji">${done>=8?"\u{1F9D8}":done>=5?"\u{1F4AA}":"\u{1F331}"}</div>
    <div class="done-title">Challenge Complete</div>
    <div class="done-sub">10 days of systematic mobility work. Your body is moving differently now.</div>
    <div class="done-stats">
      <div class="done-stat"><div class="done-stat-val green">${done}</div><div class="done-stat-label">Days Done</div></div>
      <div class="done-stat"><div class="done-stat-val gold">${totalMoves}</div><div class="done-stat-label">Total Moves</div></div>
      <div class="done-stat"><div class="done-stat-val red">${sorted.length}</div><div class="done-stat-label">Areas Tracked</div></div>
    </div>
    ${hotspots?'<div class="done-hotspot"><div class="done-hotspot-title">Your Recurring Tight Spots</div><div class="done-hotspot-list">'+hotspots+'. These are the areas that need ongoing attention in your movement practice.</div></div>':""}
    <div class="done-message">Mobility is the tax you pay for sitting all day. The people who move best aren't the strongest. They're the ones who never stopped moving.</div>
  </div>`;
}

function renderHistory(){
  const list=document.getElementById("historyList");list.innerHTML="";
  for(let i=1;i<state.currentDay&&i<=10;i++){const d=state.days[i];if(!d||!d.complete)continue;
  const day=DAYS[i-1];const item=document.createElement("div");item.className="history-item "+(d.did?"done-day":"skip-day");
  let detail=d.did?day.focus+" &middot; "+(d.movesCompleted||0)+" moves":"Skipped";
  item.innerHTML='<div class="history-day">Day '+i+'</div><div class="history-detail">'+detail+'</div><div class="history-badge '+(d.did?'done':'skipped')+'">'+(d.did?'Done':'Skipped')+'</div>';
  list.appendChild(item);}
}

function startChallenge(){state.started=true;state.currentDay=1;state.days={};saveState();resetTemp();render();}

function toggleMove(idx){
  const items=document.querySelectorAll(".move-item");
  items[idx].classList.toggle("done");
  tempMoves=Array.from(document.querySelectorAll(".move-item.done")).map(el=>parseInt(el.dataset.idx));
  const ct=document.getElementById("moveCount");
  ct.innerHTML=tempMoves.length>0?"<strong>"+tempMoves.length+"</strong> of "+DAYS[state.currentDay-1].moves.length+" completed":"";
  checkReady();
}

function toggleSpot(el){el.classList.toggle("selected");tempSpots=Array.from(document.querySelectorAll(".spot-chip.selected")).map(c=>c.dataset.spot);}

function setFeel(n){
  tempFeel=n;document.querySelectorAll(".feel-btn").forEach(b=>b.classList.toggle("active",parseInt(b.dataset.feel)===n));
  document.getElementById("feelText").textContent=FEEL_LABELS[n]||"";checkReady();
}

function checkReady(){const ready=tempMoves.length>0&&tempFeel!==null;document.getElementById("completeBtn").disabled=!ready;}

function completeDay(){
  const did=tempMoves.length>0;
  state.days[state.currentDay]={complete:true,did,movesCompleted:tempMoves.length,feel:tempFeel,spots:tempSpots};
  state.currentDay++;saveState();resetTemp();render();window.scrollTo({top:0,behavior:"smooth"});
}

function resetTemp(){tempMoves=[];tempFeel=null;tempSpots=[];}
document.getElementById("historyToggle").addEventListener("click",function(){this.classList.toggle("open");document.getElementById("historyList").classList.toggle("open");});
function hardReset(){if(!confirm("Erase all progress?"))return;localStorage.removeItem(STORAGE_KEY);state={started:false,currentDay:0,days:{}};resetTemp();render();}
render();
</script>
</body></html>
