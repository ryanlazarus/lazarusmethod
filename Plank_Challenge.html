<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lazarus Method — 30-Day Plank Challenge</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap");
:root{--gold:#96792F;--gold-soft:#B8975A;--gold-bg:#FAF6ED;--navy:#1A1A2E;--charcoal:#3A3A3A;--med:#8A8A8A;--subtle:#BBBBBB;--cream:#FDFBF7;--white:#FFFFFF;--border:#E8E0D0;--green:#3A6A3A;--green-bg:#EFF5EF;--red:#8B3A3A;--red-bg:#F5EDED;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"EB Garamond",Georgia,serif;background:#F0EDE6;color:var(--charcoal);min-height:100vh;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
.shell{max-width:600px;margin:0 auto;padding:16px 16px 40px;overflow-x:hidden;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;}
.top-logo{width:40px;height:40px;}
.top-brand{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:9px;letter-spacing:4px;color:var(--gold-soft);text-transform:uppercase;font-weight:600;}
.top-actions{display:flex;gap:8px;}
.top-btn{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;border:1px solid var(--border);background:var(--white);color:var(--med);border-radius:3px;padding:6px 14px;cursor:pointer;transition:all 0.2s;}
.top-btn:hover{border-color:var(--charcoal);color:var(--charcoal);}
.top-btn.danger{color:var(--red);border-color:var(--red);}.top-btn.danger:hover{background:var(--red-bg);}

/* PROGRESS BAR */
.progress-wrap{margin-bottom:20px;}
.progress-label{display:flex;justify-content:space-between;font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:var(--med);margin-bottom:6px;}
.progress-label strong{color:var(--navy);}
.progress-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:5px;transition:width 0.5s ease;}

/* STATS */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:12px 8px;text-align:center;}
.stat-value{font-family:"EB Garamond",Georgia,serif;font-size:24px;font-weight:700;line-height:1;}
.stat-value.green{color:var(--green);}.stat-value.gold{color:var(--gold);}.stat-value.navy{color:var(--navy);}.stat-value.red{color:var(--red);}
.stat-label{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--med);font-weight:600;margin-top:3px;}

/* DAILY CARD */
.daily-card{background:var(--white);border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,0.06);overflow:hidden;margin-bottom:16px;}
.daily-header{background:var(--navy);color:var(--white);padding:20px 24px;text-align:center;}
.daily-day-label{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:var(--gold-soft);margin-bottom:6px;}
.daily-title{font-size:24px;font-weight:700;}
.daily-body{padding:24px;}

/* TIME DISPLAY */
.time-display{text-align:center;margin-bottom:24px;}
.time-big{font-family:"EB Garamond",Georgia,serif;font-size:64px;font-weight:700;color:var(--navy);line-height:1;}
.time-unit{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--med);font-weight:700;margin-top:4px;}
.time-vs{font-size:14px;color:var(--gold);font-style:italic;margin-top:8px;}

/* REST DAY */
.rest-display{text-align:center;padding:20px 0;margin-bottom:24px;}
.rest-emoji{font-size:48px;margin-bottom:8px;}
.rest-title{font-size:20px;font-weight:700;color:var(--navy);}
.rest-sub{font-size:14px;color:var(--med);font-style:italic;margin-top:4px;}

/* FORM TIPS */
.form-box{background:var(--gold-bg);border:1px solid var(--gold);border-radius:6px;padding:16px 18px;margin-bottom:24px;}
.form-title{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--gold);margin-bottom:10px;}
.form-tip{font-size:13.5px;color:var(--charcoal);line-height:1.55;margin-bottom:6px;display:flex;align-items:flex-start;gap:8px;}
.form-tip:last-child{margin-bottom:0;}
.form-tip-icon{color:var(--gold);flex-shrink:0;font-size:12px;padding-top:3px;}

/* DID IT */
.did-section{text-align:center;margin-bottom:24px;}
.did-label{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--navy);margin-bottom:14px;}
.did-toggle{display:inline-flex;border-radius:6px;overflow:hidden;border:2px solid var(--border);}
.did-opt{padding:14px 32px;font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;background:var(--white);color:var(--med);user-select:none;touch-action:manipulation;}
.did-opt:first-child{border-right:2px solid var(--border);}
.did-opt.active-yes{background:var(--green);color:var(--white);border-color:var(--green);}
.did-opt.active-no{background:var(--red);color:var(--white);border-color:var(--red);}

/* DIFFICULTY */
.diff-section{display:none;text-align:center;margin-bottom:24px;}
.diff-section.visible{display:block;}
.diff-label{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--navy);margin-bottom:12px;}
.diff-row{display:flex;justify-content:center;gap:8px;margin-bottom:8px;}
.diff-btn{width:48px;height:48px;border-radius:10px;border:2px solid var(--border);background:var(--cream);font-size:24px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.diff-btn:hover{border-color:var(--gold);transform:scale(1.08);}
.diff-btn.active{border-color:var(--navy);background:var(--gold-bg);transform:scale(1.12);box-shadow:0 3px 10px rgba(26,26,46,0.12);}
.diff-text{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--med);font-weight:600;min-height:14px;}

/* CHECKPOINT */
.checkpoint{display:none;margin-bottom:24px;background:var(--gold-bg);border:2px solid var(--gold);border-radius:8px;padding:20px;text-align:center;}
.checkpoint.visible{display:block;}
.checkpoint-title{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;color:var(--gold);margin-bottom:12px;}
.checkpoint-q{font-size:15px;color:var(--navy);font-weight:600;margin-bottom:14px;}
.checkpoint-row{display:flex;justify-content:center;gap:8px;margin-bottom:8px;}
.checkpoint-btn{width:48px;height:48px;border-radius:10px;border:2px solid var(--border);background:var(--white);font-size:22px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.checkpoint-btn:hover{border-color:var(--gold);transform:scale(1.08);}
.checkpoint-btn.active{border-color:var(--gold);background:var(--gold-bg);transform:scale(1.12);box-shadow:0 3px 10px rgba(150,121,47,0.15);}
.checkpoint-text{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;color:var(--med);font-weight:600;min-height:14px;}

.complete-btn{display:block;width:100%;padding:16px;border:none;border-radius:6px;background:var(--navy);color:var(--white);font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all 0.2s;touch-action:manipulation;}
.complete-btn:hover{background:#2A2A4E;transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,26,46,0.2);}
.complete-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none;}

/* HISTORY */
.history-toggle{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;cursor:pointer;user-select:none;margin-bottom:8px;}
.history-toggle-text{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--med);}
.history-toggle-arrow{font-size:12px;color:var(--med);transition:transform 0.2s;}
.history-toggle.open .history-toggle-arrow{transform:rotate(180deg);}
.history-grid{display:none;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px;}
.history-grid.open{display:grid;}
.history-cell{padding:8px 4px;text-align:center;border-radius:6px;border:1px solid var(--border);background:var(--white);font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;}
.history-cell.done{background:var(--green-bg);border-color:var(--green);}
.history-cell.missed{background:var(--red-bg);border-color:var(--red);}
.history-cell.rest{background:var(--gold-bg);border-color:var(--gold);}
.history-cell-day{font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700;color:var(--med);margin-bottom:2px;}
.history-cell.done .history-cell-day{color:var(--green);}
.history-cell.missed .history-cell-day{color:var(--red);}
.history-cell.rest .history-cell-day{color:var(--gold);}
.history-cell-time{font-size:11px;font-weight:700;color:var(--navy);}
.history-cell-icon{font-size:14px;}

/* INTRO */
.intro-card{background:var(--white);border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,0.06);padding:32px 28px;margin-bottom:16px;text-align:center;}
.intro-card h2{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:16px;}
.intro-card p{font-size:15px;line-height:1.7;color:var(--charcoal);margin-bottom:12px;}
.intro-box{background:var(--gold-bg);border:1px solid var(--gold);border-radius:4px;padding:16px 20px;margin:20px 0;text-align:left;}
.intro-box p{font-size:14px;line-height:1.6;margin-bottom:6px;}.intro-box p:last-child{margin-bottom:0;}
.start-btn{display:block;width:100%;padding:16px;border:none;border-radius:6px;background:var(--gold);color:var(--white);font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:24px;touch-action:manipulation;}
.start-btn:hover{background:#7A6428;transform:translateY(-1px);}

/* DONE */
.done-card{background:var(--white);border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,0.06);padding:40px 28px;text-align:center;margin-bottom:16px;}
.done-emoji{font-size:48px;margin-bottom:16px;}
.done-title{font-size:24px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.done-sub{font-size:15px;color:var(--med);font-style:italic;margin-bottom:24px;line-height:1.6;}
.done-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px;}
.done-stat{background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:16px 8px;text-align:center;}
.done-stat-val{font-family:"EB Garamond",Georgia,serif;font-size:28px;font-weight:700;line-height:1;}
.done-stat-val.green{color:var(--green);}.done-stat-val.gold{color:var(--gold);}.done-stat-val.red{color:var(--red);}
.done-stat-label{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--med);font-weight:600;margin-top:4px;}
.done-journey{margin-top:20px;text-align:left;background:var(--gold-bg);border:1px solid var(--gold);border-radius:6px;padding:16px 20px;}
.done-journey-title{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--gold);margin-bottom:10px;}
.done-journey-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(150,121,47,0.2);font-size:14px;}
.done-journey-row:last-child{border-bottom:none;}
.done-journey-label{color:var(--charcoal);font-weight:600;}
.done-journey-val{color:var(--navy);font-weight:700;}
.done-message{font-size:16px;font-weight:700;color:var(--navy);line-height:1.6;margin-top:24px;}

.footer{text-align:center;padding:20px 0;border-top:1px solid var(--border);margin-top:12px;}
.footer-text{font-size:11px;color:var(--subtle);font-style:italic;}
.footer-copy{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:9px;color:var(--subtle);margin-top:4px;letter-spacing:0.5px;}

/* MOBILE RESPONSIVE */
@media (max-width:480px){
  .shell{padding:12px 12px 32px;}
  .stats-row{grid-template-columns:1fr 1fr;gap:6px;}
  .stat-value{font-size:22px;}
  .stat-label{font-size:7px;}
  .overview-grid{grid-template-columns:repeat(5,1fr);gap:3px;}
  .overview-cell{padding:5px 2px;}
  .overview-cell-day{font-size:6px;}
  .overview-cell-time{font-size:9px;}
  .plank-images{grid-template-columns:1fr;gap:12px;}
  .benefits-grid{grid-template-columns:1fr;gap:8px;}
  .history-grid{grid-template-columns:repeat(3,1fr);}
  .done-stats{grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .done-stat-val{font-size:24px;}
  .time-big{font-size:52px;}
  .daily-card .daily-body{padding:18px 16px;}
  .daily-header{padding:16px 18px;}
  .daily-title{font-size:20px;}
  .did-opt{padding:12px 24px;font-size:11px;}
  .diff-btn,.checkpoint-btn{width:44px;height:44px;font-size:20px;}
  .diff-row,.checkpoint-row{gap:6px;}
  .form-box{padding:14px 14px;}
  .form-tip{font-size:12.5px;}
  .intro-card{padding:24px 18px;}
  .intro-card h2{font-size:20px;}
  .intro-card p{font-size:14px;}
  .intro-box p{font-size:13px;}
  .complete-btn,.start-btn{padding:14px;font-size:12px;letter-spacing:2px;}
  .rest-emoji{font-size:40px;}
  .overview-legend{gap:10px;}
  .overview-legend-item{font-size:9px;}
  .progress-label{font-size:9px;}
  .top-brand{font-size:8px;letter-spacing:3px;}
  .top-btn{font-size:9px;padding:5px 10px;}
  .done-card{padding:28px 18px;}
  .done-journey{padding:14px 16px;}
  .checkpoint{padding:16px 14px;}
}

@media (max-width:360px){
  .overview-grid{grid-template-columns:repeat(5,1fr);gap:2px;}
  .overview-cell-day{font-size:5px;}
  .overview-cell-time{font-size:8px;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .did-opt{padding:10px 18px;}
  .diff-btn,.checkpoint-btn{width:40px;height:40px;font-size:18px;}
  .history-grid{grid-template-columns:repeat(3,1fr);gap:4px;}
}

@media print{
  body{background:white !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .top-actions{display:none !important;}.complete-btn,.start-btn{display:none !important;}
  .daily-card,.intro-card,.done-card,.stat-card,.history-cell{break-inside:avoid;page-break-inside:avoid;}
  .daily-header{background:#1A1A2E !important;color:white !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .progress-fill{background:#3A6A3A !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .history-cell.done{background:#EFF5EF !important;border-color:#3A6A3A !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .history-cell.rest{background:#FAF6ED !important;border-color:#96792F !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}
  .history-grid{display:grid !important;}
}

/* PLANK ILLUSTRATIONS */
.plank-images{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0;}
.plank-img-card{background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:16px 12px;text-align:center;}
.plank-img-card svg{width:100%;max-width:220px;height:auto;margin-bottom:8px;}
.plank-img-label{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--navy);}
.plank-img-sub{font-size:12px;color:var(--med);margin-top:2px;}

/* BENEFITS */
.benefits-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
.benefit{padding:14px 12px;border-radius:6px;text-align:center;background:var(--green-bg);border:1px solid #C4DBC4;}
.benefit-icon{font-size:22px;margin-bottom:4px;}
.benefit-text{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:11px;font-weight:700;color:var(--green);letter-spacing:0.5px;}

/* 30-DAY OVERVIEW */
.overview-title{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--navy);margin-bottom:10px;text-align:center;}
.overview-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-bottom:16px;}
.overview-cell{padding:6px 2px;text-align:center;border-radius:4px;background:var(--cream);border:1px solid var(--border);}
.overview-cell.rest-cell{background:var(--gold-bg);border-color:var(--gold);}
.overview-cell-day{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:7px;letter-spacing:1px;text-transform:uppercase;font-weight:700;color:var(--med);margin-bottom:1px;}
.overview-cell-time{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;font-weight:700;color:var(--navy);}
.overview-cell.rest-cell .overview-cell-time{color:var(--gold);font-size:8px;}
.overview-legend{display:flex;justify-content:center;gap:16px;margin-bottom:16px;}
.overview-legend-item{display:flex;align-items:center;gap:5px;font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;font-size:10px;color:var(--med);font-weight:600;}
.overview-legend-dot{width:10px;height:10px;border-radius:2px;}
.overview-legend-dot.work{background:var(--cream);border:1px solid var(--border);}
.overview-legend-dot.rest{background:var(--gold-bg);border:1px solid var(--gold);}

  /* ============================================
     MOBILE RESPONSIVE OVERRIDES
     Auto-patched for vertical mobile viewing
     ============================================ */
  body {
    overflow-x: hidden;
  }

  /* Common container selectors — constrain to viewport width */
  .input-inner, .patient-inner, .main, .main-wrap, .report-wrap,
  .container, .shell, .prog-wrap, #document, #doc,
  .worksheet-inner, .card-inner, .content-wrap, .page-wrap,
  .section-wrap, .inner, .wrapper {
    max-width: 100% !important;
    width: 100% !important;
    box-sizing: border-box !important;
  }

  @media (max-width: 640px) {

    /* Prevent iOS from zooming on input focus */
    input, select, textarea, button {
      font-size: 16px !important;
    }

    /* Stack any side-by-side layouts */
    .grid, .two-col, .three-col, .columns,
    [style*="display:flex"], [style*="display: flex"] {
      flex-direction: column !important;
    }

    /* Make tables scroll rather than overflow */
    table {
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
    }

    /* Ensure padding on body for breathing room */
    body {
      padding-left: 12px !important;
      padding-right: 12px !important;
    }

    /* Override any remaining fixed-width elements */
    [style*="width:"] {
      max-width: 100% !important;
    }
  }

</style>
</head>
<body>
<div class="shell">

function renderStats(){
  document.getElementById("progressWrap").style.display="";
  document.getElementById("statsRow").style.display="";
  document.getElementById("historyWrap").style.display=state.currentDay>1?"":"none";
  const cd=state.currentDay;
  const pct=Math.round(((cd-1)/30)*100);
  document.getElementById("progressDay").textContent=cd;
  document.getElementById("progressPct").textContent=pct+"%";
  document.getElementById("progressFill").style.width=pct+"%";
  document.getElementById("statDay").textContent=cd;
  const todaySec=PLAN[cd-1];
  document.getElementById("statTime").textContent=todaySec===0?"Rest":todaySec+"s";
  let done=0,missed=0;
  Object.values(state.days).forEach(d=>{if(d.did)done++;else if(d.did===false)missed++;});
  document.getElementById("statDone").textContent=done;
  document.getElementById("statMissed").textContent=missed;
}

function renderDailyCard(){
  const cd=state.currentDay;
  const sec=PLAN[cd-1];
  const isRest=sec===0;
  const prevSec=cd>1?PLAN[cd-2]:0;
  const isCheckpoint=CHECKPOINTS.includes(cd)&&!isRest;

  let bodyHTML="";
  if(isRest){
    bodyHTML=`
    <div class="rest-display"><div class="rest-emoji">&#128716;</div><div class="rest-title">Rest Day</div><div class="rest-sub">Recovery is part of the challenge. Your core is rebuilding.</div></div>
    <button class="complete-btn" onclick="completeRest()">Log Rest Day</button>`;
  } else {
    const vsText=prevSec>0&&prevSec!==sec?"Up from "+prevSec+" seconds":"";
    bodyHTML=`
    <div class="time-display">
      <div class="time-big">${sec}</div>
      <div class="time-unit">seconds</div>
      ${vsText?'<div class="time-vs">'+vsText+'</div>':""}
    </div>
    <div class="form-box">
      <div class="form-title">&#128170; Form Reminders</div>
      <div class="form-tip"><div class="form-tip-icon">&#10022;</div><div>Elbows under shoulders, 90 degrees, pressed into the floor</div></div>
      <div class="form-tip"><div class="form-tip-icon">&#10022;</div><div>Pelvis tucked, glutes activated, spine long</div></div>
      <div class="form-tip"><div class="form-tip-icon">&#10022;</div><div>Breathe steadily. Don't hold your breath.</div></div>
    </div>
    <div class="did-section">
      <div class="did-label">Did you hold for ${sec} seconds?</div>
      <div class="did-toggle">
        <div class="did-opt" id="didYes" onclick="setDid(true)">&#10003; Yes</div>
        <div class="did-opt" id="didNo" onclick="setDid(false)">&#10007; No</div>
      </div>
    </div>
    <div class="diff-section" id="diffSection">
      <div class="diff-label">How hard was it?</div>
      <div class="diff-row" id="diffRow">
        <div class="diff-btn" data-diff="1" onclick="setDiff(1)">&#128524;</div>
        <div class="diff-btn" data-diff="2" onclick="setDiff(2)">&#128528;</div>
        <div class="diff-btn" data-diff="3" onclick="setDiff(3)">&#128556;</div>
        <div class="diff-btn" data-diff="4" onclick="setDiff(4)">&#128553;</div>
        <div class="diff-btn" data-diff="5" onclick="setDiff(5)">&#129327;</div>
      </div>
      <div class="diff-text" id="diffText"></div>
    </div>
    ${isCheckpoint?`
    <div class="checkpoint visible" id="checkpoint">
      <div class="checkpoint-title">&#127942; Day ${cd} Core Strength Check-In</div>
      <div class="checkpoint-q">How does your core feel compared to Day 1?</div>
      <div class="checkpoint-row" id="checkRow">
        <div class="checkpoint-btn" data-val="1" onclick="setCheck(1)">&#128169;</div>
        <div class="checkpoint-btn" data-val="2" onclick="setCheck(2)">&#128528;</div>
        <div class="checkpoint-btn" data-val="3" onclick="setCheck(3)">&#128170;</div>
        <div class="checkpoint-btn" data-val="4" onclick="setCheck(4)">&#128293;</div>
        <div class="checkpoint-btn" data-val="5" onclick="setCheck(5)">&#129321;</div>
      </div>
      <div class="checkpoint-text" id="checkText"></div>
    </div>`:""}
    <button class="complete-btn" id="completeBtn" disabled onclick="completeDay()">Complete Day ${cd}</button>`;
  }

  document.getElementById("viewDay").innerHTML=`
  <div class="daily-card">
    <div class="daily-header">
      <div class="daily-day-label">Day ${cd} of 30</div>
      <div class="daily-title">${isRest?"Recovery Day":sec+" Second Plank"}</div>
    </div>
    <div class="daily-body">${bodyHTML}</div>
  </div>`;
}

function renderComplete(){
  document.getElementById("progressWrap").style.display="";
  document.getElementById("progressFill").style.width="100%";
  document.getElementById("progressDay").textContent="30";
  document.getElementById("progressPct").textContent="100%";
  document.getElementById("statsRow").style.display="none";
  document.getElementById("historyWrap").style.display="";
  document.getElementById("historyToggle").classList.add("open");
  document.getElementById("historyGrid").classList.add("open");
  renderHistory();

  let done=0,missed=0,restDays=0;
  for(let i=1;i<=30;i++){const d=state.days[i];if(PLAN[i-1]===0){restDays++;}else if(d&&d.did)done++;else missed++;}

  const cp=state.checkpoints||{};
  const el=document.getElementById("viewDone");
  el.innerHTML=`
  <div class="done-card">
    <div class="done-emoji">${done>=22?"\\u{1F3C6}":done>=15?"\\u{1F4AA}":"\\u{1F331}"}</div>
    <div class="done-title">Challenge Complete</div>
    <div class="done-sub">30 days. 20 seconds to 100 seconds. You showed up and did the work.</div>
    <div class="done-stats">
      <div class="done-stat"><div class="done-stat-val green">${done}</div><div class="done-stat-label">Completed</div></div>
      <div class="done-stat"><div class="done-stat-val red">${missed}</div><div class="done-stat-label">Missed</div></div>
      <div class="done-stat"><div class="done-stat-val gold">${restDays}</div><div class="done-stat-label">Rest Days</div></div>
    </div>
    <div class="done-journey">
      <div class="done-journey-title">Your Core Strength Journey</div>
      <div class="done-journey-row"><div class="done-journey-label">Day 1</div><div class="done-journey-val">20 seconds</div></div>
      ${cp[10]?'<div class="done-journey-row"><div class="done-journey-label">Day 10 Check-In</div><div class="done-journey-val">'+CHECK_LABELS[cp[10]]+'</div></div>':""}
      ${cp[20]?'<div class="done-journey-row"><div class="done-journey-label">Day 20 Check-In</div><div class="done-journey-val">'+CHECK_LABELS[cp[20]]+'</div></div>':""}
      ${cp[30]?'<div class="done-journey-row"><div class="done-journey-label">Day 30 Final</div><div class="done-journey-val">'+CHECK_LABELS[cp[30]]+'</div></div>':""}
      <div class="done-journey-row"><div class="done-journey-label">Day 30</div><div class="done-journey-val">100 seconds</div></div>
    </div>
    <div class="done-message">A strong core isn't built in a day. It's built in 30 of them.<br>You just proved you can show up when it's hard.</div>
  </div>`;
}

function renderHistory(){
  const grid=document.getElementById("historyGrid");grid.innerHTML="";
  for(let i=1;i<state.currentDay&&i<=30;i++){
    const d=state.days[i];const sec=PLAN[i-1];const isRest=sec===0;
    const cell=document.createElement("div");
    if(isRest){cell.className="history-cell rest";cell.innerHTML=`<div class="history-cell-day">Day ${i}</div><div class="history-cell-icon">&#128716;</div>`;}
    else if(d&&d.did){cell.className="history-cell done";cell.innerHTML=`<div class="history-cell-day">Day ${i}</div><div class="history-cell-time">${sec}s &#10003;</div>`;}
    else{cell.className="history-cell missed";cell.innerHTML=`<div class="history-cell-day">Day ${i}</div><div class="history-cell-icon">&#10007;</div>`;}
    grid.appendChild(cell);
  }
}

function startChallenge(){state.started=true;state.currentDay=1;state.days={};state.checkpoints={};saveState();resetTemp();render();}

function setDid(yes){
  tempDid=yes;
  document.getElementById("didYes").className="did-opt"+(yes?" active-yes":"");
  document.getElementById("didNo").className="did-opt"+(!yes?" active-no":"");
  const ds=document.getElementById("diffSection");
  if(ds)ds.classList.toggle("visible",yes);
  if(!yes){tempDiff=null;}
  checkReady();
}

function setDiff(n){
  tempDiff=n;
  document.querySelectorAll(".diff-btn").forEach(b=>b.classList.toggle("active",parseInt(b.dataset.diff)===n));
  document.getElementById("diffText").textContent=DIFF_LABELS[n]||"";
  checkReady();
}

function setCheck(n){
  tempCheck=n;
  document.querySelectorAll(".checkpoint-btn").forEach(b=>b.classList.toggle("active",parseInt(b.dataset.val)===n));
  document.getElementById("checkText").textContent=CHECK_LABELS[n]||"";
  checkReady();
}

function checkReady(){
  const cd=state.currentDay;
  const isCheckpoint=CHECKPOINTS.includes(cd)&&PLAN[cd-1]!==0;
  let ready=false;
  if(tempDid===false) ready=!isCheckpoint||tempCheck!==null;
  else if(tempDid===true) ready=tempDiff!==null&&(!isCheckpoint||tempCheck!==null);
  const btn=document.getElementById("completeBtn");if(btn)btn.disabled=!ready;
}

function completeDay(){
  const cd=state.currentDay;
  state.days[cd]={did:tempDid,diff:tempDid?tempDiff:null};
  if(tempCheck!==null)state.checkpoints[cd]=tempCheck;
  state.currentDay=cd+1;saveState();resetTemp();render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function completeRest(){
  state.days[state.currentDay]={did:null,rest:true};
  state.currentDay++;saveState();render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function resetTemp(){tempDid=null;tempDiff=null;tempCheck=null;}

document.getElementById("historyToggle").addEventListener("click",function(){
  this.classList.toggle("open");document.getElementById("historyGrid").classList.toggle("open");
});

function hardReset(){
  if(!confirm("This will erase all 30 days of progress. Are you sure?"))return;
  localStorage.removeItem(STORAGE_KEY);
  state={started:false,currentDay:0,days:{},checkpoints:{}};resetTemp();render();
}

render();
</script>
</body></html>
